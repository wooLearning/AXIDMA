        .data-table td {
          color: #191f28;
          vertical-align: top;
        }
        .tab-content {
          display: none;
          animation: fadeIn 0.3s ease-out forwards;
        }
        .tab-content.active {
          display: block;
        }
        @keyframes fadeIn {
          from { opacity: 0; transform: translateY(5px); }
          to { opacity: 1; transform: translateY(0); }
        }

        /* SG & AXI Animation Classes */
        .bd-card { transition: all 0.4s ease; border: 2px solid transparent; }
        .bd-active { border-color: #3182f6; box-shadow: 0 0 0 4px rgba(49, 130, 246, 0.2); transform: translateX(10px); }
        .bd-updating { border-color: #f59e0b; box-shadow: 0 0 0 4px rgba(245, 158, 11, 0.2); transform: translateX(10px); }
        .bd-completed { border-color: #22c55e; background-color: #f0fdf4; opacity: 0.7; }
        
        .data-chunk { transition: all 0.4s ease; border: 2px dashed #cbd5e1; }
        .data-chunk-active { border-color: #8b5cf6; border-style: solid; box-shadow: 0 0 15px rgba(139, 92, 246, 0.4); background-color: #f3e8ff; }
        .data-chunk-done { border-color: #22c55e; border-style: solid; background-color: #dcfce7; }
        
        @keyframes progressFill { from { width: 0%; } to { width: 100%; } }
        .progress-active { animation: progressFill 2s linear forwards; }
        
        /* Stream Packet Animations */
        .stream-packet { 
          position: absolute; 
          transition: transform 2s linear, opacity 0.3s;
        }
        
        @keyframes flowConveyor {
          0% { background-position: 0 0; }
          100% { background-position: 40px 0; }
        }
        .conveyor-belt {
          background-image: linear-gradient(45deg, rgba(255,255,255,.15) 25%, transparent 25%, transparent 50%, rgba(255,255,255,.15) 50%, rgba(255,255,255,.15) 75%, transparent 75%, transparent);
          background-size: 40px 40px;
        }
        .conveyor-active {
          animation: flowConveyor 1s linear infinite reverse;
        }
        
        /* AXI4 Full Signal Animations */
        .packet { transition: all 0.5s ease-in-out; opacity: 0; position: absolute; }
        .packet.moving-right { transform: translateX(300px); opacity: 1; }
        .packet.moving-left { transform: translateX(-300px); opacity: 1; }

        /* Bitfield Hover Effects */
        .bit-group { transition: all 0.2s; cursor: pointer; }
        .bit-group:hover { transform: scale(1.05); z-index: 10; position: relative; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        .desc-box { transition: all 0.3s; }

        .sg-code-panel {
          background: #1e293b;
          border-radius: 0.75rem;
          padding: 1.5rem;
          overflow-x: auto;
          box-shadow: inset 0 2px 8px rgba(15, 23, 42, 0.35);
          color: #cbd5e1;
          font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
          font-size: 0.8125rem;
          line-height: 1.85;
        }
        .sg-code-header {
          display: flex;
          align-items: center;
          gap: 0.5rem;
          padding-bottom: 0.75rem;
          margin-bottom: 1rem;
          border-bottom: 1px solid #475569;
          color: #cbd5e1;
          font-size: 0.75rem;
          font-weight: 700;
          letter-spacing: 0.02em;
        }
        .sg-code-prompt {
          color: #94a3b8;
          font-weight: 800;
        }
        .sg-code-section {
          margin-top: 1.25rem;
        }
        .sg-code-section:first-of-type {
          margin-top: 0;
        }
        .sg-code-comment {
          color: #64748b;
          margin-bottom: 0.25rem;
        }
        .sg-code-symbol {
          color: #4ade80;
          font-weight: 700;
        }
        .sg-code-text {
          color: #cbd5e1;
        }
        .sg-code-blue {
          color: #93c5fd;
          font-weight: 700;
        }
        .sg-code-red {
          color: #fca5a5;
          font-weight: 700;
        }
        .sg-code-inline-comment {
          color: #64748b;
          margin-left: 1.5rem;
          white-space: nowrap;
        }
        @media (max-width: 767px) {
          .sg-code-panel {
            padding: 1rem;
            font-size: 0.75rem;
          }
          .sg-code-inline-comment {
            display: block;
            margin-left: 0;
          }
        }

        .wide-visual {
          width: 100%;
          overflow-x: auto;
          -webkit-overflow-scrolling: touch;
        }
        .wide-visual-canvas {
          min-width: 860px;
        }
        @media (max-width: 767px) {
          .wide-visual {
            margin-left: -0.5rem;
            margin-right: -0.5rem;
            padding-left: 0.5rem;
            padding-right: 0.5rem;
            padding-bottom: 0.5rem;
          }
          .mobile-compact-card {
            padding: 1.25rem;
          }
        }
  </style>

  </script>
  <script>
        const lucide = {
          createIcons() {
            const icons = {
              "alert-triangle": "<path d='M10.3 3.9 2.6 17.2a2 2 0 0 0 1.7 3h15.4a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0Z'/><path d='M12 9v4'/><path d='M12 17h.01'/>",
              "arrow-down": "<path d='M12 5v14'/><path d='m19 12-7 7-7-7'/>",
              "arrow-right-left": "<path d='m16 3 4 4-4 4'/><path d='M20 7H4'/><path d='m8 21-4-4 4-4'/><path d='M4 17h16'/>",
              "arrow-up": "<path d='M12 19V5'/><path d='m5 12 7-7 7 7'/>",
              "bookmark": "<path d='M19 21 12 17 5 21V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v16Z'/>",
              "check": "<path d='m20 6-11 11-5-5'/>",
              "check-circle-2": "<path d='M9 12l2 2 4-4'/><circle cx='12' cy='12' r='10'/>",
              "chevron-left": "<path d='m15 18-6-6 6-6'/>",
              "chevron-right": "<path d='m9 18 6-6-6-6'/>",
              "cpu": "<rect x='4' y='4' width='16' height='16' rx='2'/><rect x='9' y='9' width='6' height='6'/><path d='M9 1v3M15 1v3M9 20v3M15 20v3M20 9h3M20 14h3M1 9h3M1 14h3'/>",
              "download": "<path d='M12 3v12'/><path d='m7 10 5 5 5-5'/><path d='M5 21h14'/>",
              "file-image": "<path d='M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8Z'/><path d='M14 2v6h6'/><circle cx='10' cy='13' r='2'/><path d='m20 17-3-3-5 5'/>",
              "file-key-2": "<path d='M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8Z'/><path d='M14 2v6h6'/><circle cx='10' cy='16' r='2'/><path d='m12 14 4-4 2 2-1 1 1 1'/>",
              "file-text": "<path d='M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8Z'/><path d='M14 2v6h6'/><path d='M8 13h8M8 17h8M8 9h2'/>",
              "help-circle": "<circle cx='12' cy='12' r='10'/><path d='M9.1 9a3 3 0 0 1 5.8 1c0 2-3 2-3 4'/><path d='M12 17h.01'/>",
              "info": "<circle cx='12' cy='12' r='10'/><path d='M12 16v-4'/><path d='M12 8h.01'/>",
              "layers": "<path d='m12 2 9 5-9 5-9-5 9-5Z'/><path d='m3 12 9 5 9-5'/><path d='m3 17 9 5 9-5'/>",
              "loader": "<path d='M21 12a9 9 0 1 1-6.2-8.6'/>",
              "lock": "<rect x='3' y='11' width='18' height='11' rx='2'/><path d='M7 11V7a5 5 0 0 1 10 0v4'/>",
              "more-vertical": "<circle cx='12' cy='5' r='1'/><circle cx='12' cy='12' r='1'/><circle cx='12' cy='19' r='1'/>",
              "play": "<path d='m8 5 11 7-11 7V5Z'/>",
              "save": "<path d='M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2Z'/><path d='M17 21v-8H7v8'/><path d='M7 3v5h8'/>",
              "server": "<rect x='3' y='4' width='18' height='7' rx='2'/><rect x='3' y='13' width='18' height='7' rx='2'/><path d='M7 8h.01M7 17h.01'/>",
              "settings": "<path d='M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6Z'/><path d='M19.4 15a1.7 1.7 0 0 0 .3 1.9l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.7 1.7 0 0 0-1.9-.3 1.7 1.7 0 0 0-1 1.6V21a2 2 0 1 1-4 0v-.1a1.7 1.7 0 0 0-1-1.6 1.7 1.7 0 0 0-1.9.3l-.1.1A2 2 0 1 1 4.2 17l.1-.1a1.7 1.7 0 0 0 .3-1.9 1.7 1.7 0 0 0-1.6-1H3a2 2 0 1 1 0-4h.1a1.7 1.7 0 0 0 1.6-1 1.7 1.7 0 0 0-.3-1.9l-.1-.1A2 2 0 1 1 7 4.2l.1.1a1.7 1.7 0 0 0 1.9.3h.1A1.7 1.7 0 0 0 10 3.1V3a2 2 0 1 1 4 0v.1a1.7 1.7 0 0 0 1 1.6 1.7 1.7 0 0 0 1.9-.3l.1-.1A2 2 0 1 1 19.8 7l-.1.1a1.7 1.7 0 0 0-.3 1.9v.1a1.7 1.7 0 0 0 1.6.9h.1a2 2 0 1 1 0 4H21a1.7 1.7 0 0 0-1.6 1Z'/>",
              "upload": "<path d='M12 21V9'/><path d='m17 14-5-5-5 5'/><path d='M5 3h14'/>",
              "zap": "<path d='M13 2 3 14h9l-1 8 10-12h-9l1-8Z'/>"
            };

            document.querySelectorAll("i[data-lucide]").forEach(icon => {
              const name = icon.getAttribute("data-lucide");
              const className = `${icon.className} inline-icon`.trim();
              const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
              svg.setAttribute("viewBox", "0 0 24 24");
              svg.setAttribute("fill", "none");
              svg.setAttribute("stroke", "currentColor");
              svg.setAttribute("stroke-width", "2");
              svg.setAttribute("stroke-linecap", "round");
              svg.setAttribute("stroke-linejoin", "round");
              svg.setAttribute("class", className);
              svg.setAttribute("aria-hidden", "true");
              if (icon.id) svg.setAttribute("id", icon.id);
              if (!/\bw-/.test(className)) svg.classList.add("w-5");
              if (!/\bh-/.test(className)) svg.classList.add("h-5");
              svg.innerHTML = icons[name] || "<circle cx='12' cy='12' r='9'/>";
              icon.replaceWith(svg);
            });
          }
        };

        window.lucide = lucide;
        lucide.createIcons();

        // Tab Switching Logic
        function switchTab(tabId) {
          document.querySelectorAll('.tab-content').forEach(el => {
            el.classList.remove('active');
          });
          
          document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.className = "tab-btn px-4 py-2 rounded-lg text-[13px] font-semibold transition-all text-[#8b95a1] hover:text-[#4e5968] hover:bg-gray-200/50";
          });

          document.querySelectorAll('.mob-btn').forEach(btn => {
            btn.className = "mob-btn shrink-0 px-3 py-1.5 rounded-lg text-xs font-medium text-gray-500 bg-gray-50 border border-gray-200";
          });
          
          const content = document.getElementById(tabId + '-section');
          if(content) {
            content.classList.add('active');
          }
          
          const activeDesktopBtn = document.getElementById('nav-' + tabId);
          if(activeDesktopBtn) {
            activeDesktopBtn.className = "tab-btn px-4 py-2 rounded-lg text-[13px] font-semibold transition-all bg-white text-[#191f28] shadow-sm";
          }

          const activeMobileBtn = document.getElementById('mob-' + tabId);
          if(activeMobileBtn) {
            activeMobileBtn.className = "mob-btn shrink-0 px-3 py-1.5 rounded-lg text-xs font-bold bg-[#191f28] text-white border border-[#191f28]";
          }
        }

        const sleep = (ms) => new Promise(resolve => setTimeout(resolve, ms));
        function setElementClass(element, className) {
          if (element) element.setAttribute('class', className);
        }

        // AXI4 Transaction Animation Logic (from chapter 2)
        let isAxiAnimating = false;

        async function showStatus(text, colorClass) {
          const box = document.getElementById('axi-status-box');
          if(!box) return;
          box.innerHTML = text;
          box.className = `absolute top-4 left-1/2 -translate-x-1/2 bg-gray-900 border ${colorClass} px-6 py-2 rounded-xl text-sm font-bold text-center transition-all duration-300 shadow-lg text-white`;
          box.style.opacity = '1';
        }

        function createPacket(text, channelClass, topPos, direction) {
          const layer = document.getElementById('packet-layer');
          if(!layer) return;
          const packet = document.createElement('div');
          packet.className = `packet absolute ${channelClass} text-[10px] font-bold px-3 py-1.5 rounded-md shadow-md flex items-center gap-1`;
          
          if(direction === 'right') {
            packet.style.left = '4rem';
          } else {
            packet.style.right = '4rem';
          }
          packet.style.top = topPos;
          packet.innerHTML = text;
          layer.appendChild(packet);
          
          void packet.offsetWidth;
          
          packet.classList.add(direction === 'right' ? 'moving-right' : 'moving-left');
          
          setTimeout(() => {
            if (packet.parentNode) {
              packet.style.opacity = '0';
              setTimeout(() => packet.remove(), 500);
            }
          }, 1000);
        }

        async function runAxiReadBurst() {
          if (isAxiAnimating) return;
          isAxiAnimating = true;
          document.getElementById('btn-axi-read').classList.add('opacity-50', 'cursor-not-allowed');
          document.getElementById('btn-axi-write').classList.add('opacity-50', 'cursor-not-allowed');

          await showStatus("Step 1: AR 채널 (Read Address 전송)", "border-blue-400 text-blue-400");
          createPacket("ARADDR=0x1000, ARLEN=3", "bg-blue-600 text-white", "11%", "right");
          await sleep(1500);

          await showStatus("Step 2: R 채널 (Burst Data 수신 중...)", "border-blue-300 text-blue-300");
          for(let i=0; i<3; i++) {
            createPacket(`RDATA Beat ${i+1}`, "bg-blue-500 text-white", "26%", "left");
            await sleep(400);
          }

          await showStatus("Step 3: R 채널 (마지막 Data + RLAST)", "border-red-400 text-red-400");
          createPacket(`RDATA Beat 4 + <span class="bg-red-500 px-1 rounded">RLAST=1</span>`, "bg-blue-500 text-white", "26%", "left");
          await sleep(1500);

          await showStatus("Read Burst Transaction 완료!", "border-green-400 text-green-400");
          await sleep(2000);
          const box = document.getElementById('axi-status-box');
          if(box) box.style.opacity = '0';
          
          document.getElementById('btn-axi-read').classList.remove('opacity-50', 'cursor-not-allowed');
          document.getElementById('btn-axi-write').classList.remove('opacity-50', 'cursor-not-allowed');
          isAxiAnimating = false;
        }

        async function runAxiWriteBurst() {
          if (isAxiAnimating) return;
          isAxiAnimating = true;
          document.getElementById('btn-axi-read').classList.add('opacity-50', 'cursor-not-allowed');
          document.getElementById('btn-axi-write').classList.add('opacity-50', 'cursor-not-allowed');

          await showStatus("Step 1: AW 채널 (Write Address 전송)", "border-green-400 text-green-400");
          createPacket("AWADDR=0x2000, AWLEN=3", "bg-green-600 text-white", "41%", "right");
          await sleep(1500);

          await showStatus("Step 2: W 채널 (Burst Data 송신 중...)", "border-green-300 text-green-300");
          for(let i=0; i<3; i++) {
            createPacket(`WDATA Beat ${i+1}`, "bg-green-500 text-white", "56%", "right");
            await sleep(400);
          }

          await showStatus("Step 3: W 채널 (마지막 Data + WLAST)", "border-red-400 text-red-400");
          createPacket(`WDATA Beat 4 + <span class="bg-red-500 px-1 rounded">WLAST=1</span>`, "bg-green-500 text-white", "56%", "right");
          await sleep(1500);

          await showStatus("Step 4: B 채널 (Write Response 수신)", "border-orange-400 text-orange-400");
          createPacket("BRESP=OKAY", "bg-red-600 text-white", "71%", "left");
          await sleep(1500);

          await showStatus("Write Burst Transaction 완료!", "border-green-400 text-green-400");
          await sleep(2000);
          const box = document.getElementById('axi-status-box');
          if(box) box.style.opacity = '0';
          
          document.getElementById('btn-axi-read').classList.remove('opacity-50', 'cursor-not-allowed');
          document.getElementById('btn-axi-write').classList.remove('opacity-50', 'cursor-not-allowed');
          isAxiAnimating = false;
        }

        // AXI-Stream Packet Animation Logic (Chapter 3)
        let isStreamAnimating = false;

        async function runStreamAnimation() {
          if (isStreamAnimating) return;

          const btn = document.getElementById('btn-stream');
          const channel = document.getElementById('stream-channel');
          const belt = channel ? channel.querySelector('div') : null;
          if (!btn || !channel || !belt) return;

          isStreamAnimating = true;
          btn.innerHTML = `<i data-lucide="loader" class="w-4 h-4 animate-spin"></i> Streaming...`;
          btn.classList.add('opacity-50', 'cursor-not-allowed');
          lucide.createIcons();

          channel.querySelectorAll('.stream-packet, .stream-signal-chip').forEach((element) => element.remove());
          belt.classList.add('conveyor-belt', 'conveyor-active');
          belt.style.backgroundColor = '#8b5cf6';

          const streamElements = [btn, channel, belt];
          const abortIfSceneUnmounted = () => {
            if (streamElements.some((element) => !element.isConnected)) {
              isStreamAnimating = false;
              return true;
            }
            return false;
          };

          const signalChip = document.createElement('div');
          signalChip.className = 'stream-signal-chip absolute top-4 left-1/2 -translate-x-1/2 z-20 bg-white border border-purple-200 text-[11px] font-bold text-[#4e5968] rounded-full px-3 py-1 shadow-sm';
          signalChip.innerHTML = '<span class="text-[#3182f6]">TVALID=1</span> · <span class="text-green-600">TREADY=1</span>';
          channel.appendChild(signalChip);

          const createStreamPacket = (index, isLast) => {
            const packet = document.createElement('div');
            packet.className = 'stream-packet absolute z-20 bg-[#3182f6] text-white text-[10px] font-bold px-3 py-1.5 rounded-md shadow-md flex items-center gap-2 whitespace-nowrap';
            packet.style.left = '-72px';
            packet.style.top = '50%';
            packet.style.opacity = '0';
            packet.style.transform = 'translate(0, -50%)';
            packet.innerHTML = isLast
              ? `TDATA D${index}<span class="bg-white text-red-600 px-1.5 py-0.5 rounded text-[9px] font-black">TLAST=1</span>`
              : `TDATA <span class="text-blue-200 font-mono">D${index}</span>`;
            channel.appendChild(packet);

            requestAnimationFrame(() => {
              const travelDistance = channel.clientWidth + 144;
              packet.style.opacity = '1';
              packet.style.transform = `translate(${travelDistance}px, -50%)`;
            });

            setTimeout(() => {
              if (packet.parentNode) {
                packet.style.opacity = '0';
                setTimeout(() => packet.remove(), 300);
              }
            }, 2050);
          };

          for (let i = 0; i < 5; i++) {
            createStreamPacket(i, i === 4);
            await sleep(430);
            if (abortIfSceneUnmounted()) return;
          }

          await sleep(2200);
          if (abortIfSceneUnmounted()) return;

          signalChip.innerHTML = '<span class="text-green-600">Packet complete</span> · TLAST accepted';
          await sleep(900);
          if (abortIfSceneUnmounted()) return;

          signalChip.remove();
          belt.classList.remove('conveyor-belt', 'conveyor-active');
          belt.style.backgroundColor = '';
          btn.innerHTML = `<i data-lucide="play" class="w-4 h-4"></i> Stream 데이터 송신`;
          btn.classList.remove('opacity-50', 'cursor-not-allowed');
          lucide.createIcons();
          isStreamAnimating = false;
        }

        // ADVANCED SG ANIMATION LOGIC (Chapter 4)
        let isSGAnimating = false;

        async function runSGAnimation() {
          if (isSGAnimating) return;
          isSGAnimating = true;

          const btn = document.getElementById('runSgBtn');
          btn.innerHTML = `<i data-lucide="loader" class="w-4 h-4 animate-spin"></i> Processing...`;
          lucide.createIcons();
          btn.classList.add('opacity-50', 'cursor-not-allowed');

          const pointer = document.getElementById('dmaEnginePointer');
          const dmaIcon = document.getElementById('dmaIcon');
          
          const bd0 = document.getElementById('bd-0');
          const bd1 = document.getElementById('bd-1');
          const bd2 = document.getElementById('bd-2');
          
          const bd0Status = document.getElementById('bd-0-status');
          const bd1Status = document.getElementById('bd-1-status');
          
          const dataChunk0 = document.getElementById('data-chunk-0');
          const dataProg0 = document.getElementById('data-prog-0');
          const dataChunk1 = document.getElementById('data-chunk-1');
          const dataProg1 = document.getElementById('data-prog-1');
          const bd0Tag = document.getElementById('bd-0-tag');
          const bd2Tag = document.getElementById('bd-2-tag');

          const sgElements = [btn, pointer, dmaIcon, bd0, bd1, bd2, bd0Status, bd1Status, dataChunk0, dataProg0, dataChunk1, dataProg1, bd0Tag, bd2Tag];
          if (sgElements.some((element) => !element)) {
            isSGAnimating = false;
            return;
          }

          const abortIfSceneUnmounted = () => {
            if (sgElements.some((element) => !element.isConnected)) {
              isSGAnimating = false;
              return true;
            }
            return false;
          };

          // Reset
          pointer.style.opacity = '0';
          pointer.style.top = '40px';
          
          bd0.className = "bd-card bg-white shadow-sm rounded-lg overflow-hidden";
          bd1.className = "bd-card bg-white shadow-sm rounded-lg overflow-hidden";
          bd2.className = "bd-card bg-white border-dashed shadow-sm rounded-lg overflow-hidden opacity-60";
          
          dataChunk0.className = "data-chunk bg-gray-50 p-4 rounded-lg relative overflow-hidden";
          dataProg0.style.width = '0%';
          dataChunk1.className = "data-chunk bg-gray-50 p-4 rounded-lg relative overflow-hidden";
          dataProg1.style.width = '0%';

          bd0Status.innerHTML = "Waiting";
          bd0Status.className = "italic text-gray-500";
          bd1Status.innerHTML = "Waiting";
          bd1Status.className = "italic text-gray-500";

          bd0Tag.classList.remove('hidden');
          bd2Tag.classList.remove('hidden');

          await sleep(800);
          if (abortIfSceneUnmounted()) return;

          // Fetch BD0
          pointer.style.opacity = '1';
          setElementClass(dmaIcon, "w-4 h-4 text-[#3182f6] animate-pulse inline-icon");
          bd0.classList.add('bd-active');
          bd0Status.innerHTML = `<i data-lucide="loader" class="w-3 h-3 animate-spin"></i> Fetching...`;
          bd0Status.className = "font-bold text-[#3182f6] flex items-center gap-1";
          lucide.createIcons();
          await sleep(1500);
          if (abortIfSceneUnmounted()) return;

          // Transfer BD0 (Gather Data)
          setElementClass(dmaIcon, "w-4 h-4 text-purple-500 animate-pulse inline-icon");
          dataChunk0.classList.add('data-chunk-active');
          bd0Status.innerHTML = `<i data-lucide="arrow-right-left" class="w-3 h-3 animate-pulse"></i> Transferring 4KB...`;
          bd0Status.className = "font-bold text-purple-600 flex items-center gap-1";
          lucide.createIcons();
          
          // Animate progress manually
          dataProg0.style.transition = 'width 1.5s linear';
          dataProg0.style.width = '100%';
          await sleep(1500);
          if (abortIfSceneUnmounted()) return;
          
          dataChunk0.classList.remove('data-chunk-active');
          dataChunk0.classList.add('data-chunk-done');

          // Update BD0
          setElementClass(dmaIcon, "w-4 h-4 text-[#f59e0b] animate-spin inline-icon");
          bd0.classList.remove('bd-active');
          bd0.classList.add('bd-updating');
          bd0Status.innerHTML = `<i data-lucide="save" class="w-3 h-3"></i> Updating Status...`;
          bd0Status.className = "font-bold text-[#f59e0b] flex items-center gap-1";
          lucide.createIcons();
          await sleep(1000);
          if (abortIfSceneUnmounted()) return;

          // Complete BD0
          bd0.classList.remove('bd-updating');
          bd0.classList.add('bd-completed');
          bd0Status.innerHTML = `<i data-lucide="check" class="w-3 h-3"></i> Complete`;
          bd0Status.className = "font-bold text-[#22c55e] flex items-center gap-1";
          lucide.createIcons();
          await sleep(800);
          if (abortIfSceneUnmounted()) return;

          // Move to BD1 ----------------------------------------
          pointer.style.top = '145px'; 
          setElementClass(dmaIcon, "w-4 h-4 text-[#3182f6] animate-pulse inline-icon");
          await sleep(800);
          if (abortIfSceneUnmounted()) return;

          // Fetch BD1
          bd1.classList.add('bd-active');
          bd1Status.innerHTML = `<i data-lucide="loader" class="w-3 h-3 animate-spin"></i> Fetching...`;
          bd1Status.className = "font-bold text-[#3182f6] flex items-center gap-1";
          lucide.createIcons();
          await sleep(1500);
          if (abortIfSceneUnmounted()) return;

          // Transfer BD1 (Gather Data)
          setElementClass(dmaIcon, "w-4 h-4 text-pink-500 animate-pulse inline-icon");
          dataChunk1.classList.add('data-chunk-active');
          bd1Status.innerHTML = `<i data-lucide="arrow-right-left" class="w-3 h-3 animate-pulse"></i> Transferring 2KB...`;
          bd1Status.className = "font-bold text-pink-600 flex items-center gap-1";
          lucide.createIcons();
          
          dataProg1.style.transition = 'width 1s linear';
          dataProg1.style.width = '100%';
          await sleep(1000);
          if (abortIfSceneUnmounted()) return;
          
          dataChunk1.classList.remove('data-chunk-active');
          dataChunk1.classList.add('data-chunk-done');

          // Update BD1
          setElementClass(dmaIcon, "w-4 h-4 text-[#f59e0b] animate-spin inline-icon");
          bd1.classList.remove('bd-active');
          bd1.classList.add('bd-updating');
          bd1Status.innerHTML = `<i data-lucide="save" class="w-3 h-3"></i> Updating (EOF)...`;
          bd1Status.className = "font-bold text-[#f59e0b] flex items-center gap-1";
          lucide.createIcons();
          await sleep(1000);
          if (abortIfSceneUnmounted()) return;

          // Complete BD1
          bd1.classList.remove('bd-updating');
          bd1.classList.add('bd-completed');
          bd1Status.innerHTML = `<i data-lucide="check-circle-2" class="w-3 h-3"></i> Complete`;
          bd1Status.className = "font-bold text-[#22c55e] flex items-center gap-1";
          lucide.createIcons();
          await sleep(800);
          if (abortIfSceneUnmounted()) return;

          // Check Tail ----------------------------------------
          pointer.style.top = '270px';
          setElementClass(dmaIcon, "w-4 h-4 text-red-500 animate-bounce inline-icon");
          await sleep(800);
          if (abortIfSceneUnmounted()) return;

          bd2.classList.add('bd-active');
          bd2Tag.classList.add('animate-pulse');
          bd2Tag.classList.remove('hidden');
          await sleep(1500);
          if (abortIfSceneUnmounted()) return;

          // Interrupt
          setElementClass(dmaIcon, "w-4 h-4 text-[#22c55e] inline-icon");
          lucide.createIcons();
          await sleep(2000);
          if (abortIfSceneUnmounted()) return;
          
          pointer.style.opacity = '0';
          bd2Tag.classList.remove('animate-pulse');
          bd2.classList.remove('bd-active');

          btn.innerHTML = `<i data-lucide="play" class="w-4 h-4"></i> SG 리스트 재실행`;
          btn.classList.remove('opacity-50', 'cursor-not-allowed');
          lucide.createIcons();
          isSGAnimating = false;
        }

        // CSR Bitfield Hover Logic (Chapter 5)
        function showDesc(elementId, text) {
          const box = document.getElementById(elementId);
          if(box) box.innerText = text;
        }

        // TEA Pipeline Animation Logic (Chapter 6)
        let isTeaAnimating = false;
        async function runTeaAnimation() {
          if(isTeaAnimating) return;
          isTeaAnimating = true;

          const btn = document.getElementById('btn-tea');
          btn.innerHTML = `<i data-lucide="loader" class="w-4 h-4 animate-spin"></i> 암호화 중...`;
          btn.classList.add('opacity-50', 'cursor-not-allowed');
          lucide.createIcons();

          const txChannel = document.getElementById('tea-tx-channel');
          const rxChannel = document.getElementById('tea-rx-channel');
          const teaCore = document.getElementById('tea-core');
          const teaLock = document.getElementById('tea-lock-icon');

          const txDist = txChannel.offsetWidth;
          const rxDist = rxChannel.offsetWidth;

          // Pulse Core
          teaCore.classList.replace('bg-orange-400', 'bg-red-500');
          teaCore.classList.replace('border-orange-500', 'border-red-600');
          teaLock.classList.add('animate-pulse');

          for(let i=0; i<5; i++) {
            // 1. Plaintext Packet (Blue) enters TX Channel
            const pPacket = document.createElement('div');
            pPacket.className = `absolute top-1/2 -translate-y-1/2 w-8 h-6 bg-[#3182f6] rounded text-white text-[8px] font-bold flex items-center justify-center shadow-md transition-transform duration-1000 linear z-20`;
            pPacket.style.left = '-32px';
            pPacket.innerText = `P${i}`;
            txChannel.appendChild(pPacket);
            void pPacket.offsetWidth;
            pPacket.style.transform = `translate(${txDist + 32}px, -50%)`;

            setTimeout(() => {
              if (pPacket && pPacket.parentNode) pPacket.remove(); // enters core
              
              // 2. Core glows slightly
              teaCore.style.transform = 'scale(1.05)';
              setTimeout(() => teaCore.style.transform = 'scale(1)', 150);

              // 3. Ciphertext Packet (Red) exits RX Channel
              const cPacket = document.createElement('div');
              cPacket.className = `absolute top-1/2 -translate-y-1/2 w-8 h-6 bg-red-500 rounded text-white text-[8px] font-bold flex items-center justify-center shadow-md transition-transform duration-1000 linear z-20`;
              cPacket.style.left = '-32px';
              cPacket.innerText = `C${i}`;
              rxChannel.appendChild(cPacket);
              void cPacket.offsetWidth;
              cPacket.style.transform = `translate(${rxDist + 32}px, -50%)`;

              setTimeout(() => {
                if (cPacket && cPacket.parentNode) cPacket.remove(); // enters dest memory
              }, 1000);

            }, 1000); // Wait for TX to finish

            await sleep(500); // Space out packets
          }

          await sleep(3000); // Wait for all to finish

          // Reset Core
          teaCore.classList.replace('bg-red-500', 'bg-orange-400');
          teaCore.classList.replace('border-red-600', 'border-orange-500');
          teaLock.classList.remove('animate-pulse');

          btn.innerHTML = `<i data-lucide="lock" class="w-4 h-4"></i> 암호화 파이프라인 가동`;
          btn.classList.remove('opacity-50', 'cursor-not-allowed');
          lucide.createIcons();
          isTeaAnimating = false;
        }
  </script>
  <script>
    window.GUIDE_NAV_ITEMS = [{"id": "intro", "desktopLabel": "1. Big Picture", "mobileLabel": "1. Big Picture"}, {"id": "axi4", "desktopLabel": "2. AXI4 Burst", "mobileLabel": "2. Burst"}, {"id": "axi", "desktopLabel": "3. AXI-Stream", "mobileLabel": "3. Stream"}, {"id": "sg", "desktopLabel": "4. SG 프로세스 심화", "mobileLabel": "4. SG 모드"}, {"id": "csr", "desktopLabel": "5. CSR 비트맵", "mobileLabel": "5. CSR"}, {"id": "case", "desktopLabel": "6. TEA 파이프라인", "mobileLabel": "6. TEA 사례"}, {"id": "system", "desktopLabel": "7. OS/Video 디버깅", "mobileLabel": "7. System"}];
    window.GUIDE_CHAPTERS = {"intro": {"id": "intro", "html": "<div class=\"space-y-4 border-b border-gray-200 pb-6\">\n        <span class=\"text-[#3182f6] font-bold text-sm tracking-wide\">Chapter 1. System-Level Overview</span>\n        <h2 class=\"text-3xl font-extrabold text-[#191f28]\">AXI DMA 아키텍처 개요 및 역할 파악</h2>\n        <p class=\"text-[#4e5968] text-lg\">Memory-Mapped 환경과 AXI-Stream 환경 간의 고속 데이터 전송 아키텍처를 체계적으로 분석합니다.</p>\n      </div>\n\n      <div class=\"bg-white rounded-2xl p-8 border border-gray-200 shadow-sm\">\n        \n        <!-- DMA의 정확한 정의 해설 -->\n        <h3 class=\"text-xl font-bold text-[#191f28] mb-4\">1.1 DMA의 정의 및 연결 구조</h3>\n        <p class=\"text-[15px] text-[#4e5968] mb-6 leading-relaxed\">\n          AXI DMA는 단순한 메모리 복사 블록을 넘어, <strong>CPU의 제어 명령(Configuration)을 기반으로</strong> <strong>AXI4 메모리 버스트 트랜잭션</strong>과\n          <strong>AXI-Stream 데이터 파이프라인</strong>을 상호 연동하는 핵심 Bridge 인터페이스입니다.\n          본 문서에서는 <strong>Control(AXI-Lite), Memory Access(AXI4 Burst), Data Flow(AXI-Stream), Advanced Operation(Scatter-Gather)</strong>의 메커니즘을 단계적으로 심층 분석합니다.\n        </p>\n\n        <div class=\"grid md:grid-cols-3 gap-6 mb-10\">\n          <div class=\"bg-[#f3e8ff] p-5 rounded-xl border border-purple-200 shadow-sm\">\n            <div class=\"flex items-center gap-2 mb-2\">\n              <i data-lucide=\"settings\" class=\"w-5 h-5 text-purple-700\"></i>\n              <h4 class=\"font-bold text-purple-900 text-[14px]\">1. AXI-Lite (Control Interface)</h4>\n            </div>\n            <p class=\"text-[13px] text-purple-800 leading-relaxed\">\n              CPU가 DMA 내부 제어 레지스터(CSR)에 접근하기 위한 프로토콜입니다. Payload 데이터 처리가 불가하며 Source/Destination Address, Transfer Length, Interrupt Configuration 등 환경 설정 값을 전송합니다.\n            </p>\n          </div>\n          \n          <div class=\"bg-[#eff7ff] p-5 rounded-xl border border-blue-200 shadow-sm\">\n            <div class=\"flex items-center gap-2 mb-2\">\n              <i data-lucide=\"server\" class=\"w-5 h-5 text-[#3182f6]\"></i>\n              <h4 class=\"font-bold text-blue-900 text-[14px]\">2. AXI4 Full (Memory Interface)</h4>\n            </div>\n            <p class=\"text-[13px] text-blue-800 leading-relaxed\">\n              실질적인 대용량 데이터 전송 경로입니다. DMA 엔진이 AXI Master로 동작하여 System Memory(예: DDR RAM) 영역에 대한 고속 Burst Read/Write 트랜잭션을 주도합니다.\n            </p>\n          </div>\n\n          <div class=\"bg-[#ecfdf5] p-5 rounded-xl border border-green-200 shadow-sm\">\n            <div class=\"flex items-center gap-2 mb-2\">\n              <i data-lucide=\"cpu\" class=\"w-5 h-5 text-green-600\"></i>\n              <h4 class=\"font-bold text-green-900 text-[14px]\">3. AXI-Stream (Data Pipeline)</h4>\n            </div>\n            <p class=\"text-[13px] text-green-800 leading-relaxed\">\n              <strong>Target 하드웨어 가속기(IP)와 직접 연결되는 고속 데이터 인터페이스.</strong> 암호화 코어, 필터(MAC), FFT 모듈과 같이 메모리 주소 체계 없이 데이터 순차 흐름 및 Packet Boundary 정합성이 요구되는 블록에 적용됩니다.\n            </p>\n          </div>\n        </div>\n\n        <div class=\"bg-[#f9fafb] border border-gray-200 rounded-2xl p-6 mb-10\">\n          <div class=\"flex items-start gap-3 mb-5\">\n            <i data-lucide=\"route\" class=\"w-5 h-5 text-[#3182f6] mt-0.5\"></i>\n            <div>\n              <h3 class=\"text-lg font-bold text-[#191f28]\">1.2 어떤 DMA IP를 선택해야 하는가?</h3>\n              <p class=\"text-[13px] text-[#4e5968] mt-1 leading-relaxed\">\n                AXI DMA라는 이름 때문에 모든 전송을 하나의 IP로 처리한다고 생각하기 쉽지만, 실제 설계에서는 <strong>데이터가 지나가는 형태</strong>에 따라 IP 선택이 달라집니다.\n              </p>\n            </div>\n          </div>\n          <div class=\"overflow-x-auto\">\n            <table class=\"data-table bg-white\">\n              <thead>\n                <tr>\n                  <th class=\"w-32\">IP 계열</th>\n                  <th>적합한 전송 형태</th>\n                  <th>핵심 포트/특징</th>\n                  <th>선택 기준</th>\n                </tr>\n              </thead>\n              <tbody>\n                <tr>\n                  <td><span class=\"inline-flex items-center gap-2 font-bold\"><i data-lucide=\"settings\" class=\"w-4 h-4 text-[#3182f6]\"></i>AXI DMA</span></td>\n                  <td>Memory ↔ AXI-Stream 가속기</td>\n                  <td>MM2S, S2MM, AXI4-MM, AXI4-Stream</td>\n                  <td><strong>Stream IP 연결</strong>, FFT/Filter/Encryptor, 일반 가속기 파이프라인</td>\n                </tr>\n                <tr>\n                  <td><span class=\"inline-flex items-center gap-2 font-bold\"><i data-lucide=\"server\" class=\"w-4 h-4 text-green-600\"></i>AXI CDMA</span></td>\n                  <td>Memory ↔ Memory 복사</td>\n                  <td>AXI4-MM만 사용, Stream 포트 없음</td>\n                  <td><strong>DDR 내부 복사</strong>, Stream IP 부재, 블록 메모리 이동</td>\n                </tr>\n                <tr>\n                  <td><span class=\"inline-flex items-center gap-2 font-bold\"><i data-lucide=\"layers\" class=\"w-4 h-4 text-[#8b5cf6]\"></i>AXI VDMA</span></td>\n                  <td>Video Frame Buffer ↔ AXI4-Stream Video</td>\n                  <td>Frame sync, HSIZE, VSIZE, Stride, SOF/EOL</td>\n                  <td><strong>2D 프레임</strong>, 라인 경계, stride, 카메라/디스플레이 경로</td>\n                </tr>\n                <tr>\n                  <td><span class=\"inline-flex items-center gap-2 font-bold\"><i data-lucide=\"network\" class=\"w-4 h-4 text-orange-600\"></i>AXI MCDMA</span></td>\n                  <td>다중 Stream 채널 동시 전송</td>\n                  <td>Multi-channel descriptor, per-channel status</td>\n                  <td><strong>멀티 채널</strong>, 채널별 descriptor/status/interrupt</td>\n                </tr>\n                <tr>\n                  <td><span class=\"inline-flex items-center gap-2 font-bold\"><i data-lucide=\"cpu\" class=\"w-4 h-4 text-gray-700\"></i>AXI DataMover</span></td>\n                  <td>사용자 정의 DMA 엔진 구성용 building block</td>\n                  <td>Memory-Mapped command/status + Stream data path</td>\n                  <td><strong>저수준 조립</strong>, command/status 직접 설계, 맞춤형 DMA 엔진</td>\n                </tr>\n              </tbody>\n            </table>\n          </div>\n          <div class=\"mt-4 grid md:grid-cols-5 gap-3\">\n            <div class=\"bg-white border border-gray-200 rounded-xl p-4\">\n              <i data-lucide=\"server\" class=\"w-5 h-5 text-green-600 mb-3\"></i>\n              <p class=\"text-[12px] font-bold text-[#191f28]\">Memory-to-Memory</p>\n              <p class=\"text-[12px] text-[#4e5968] mt-1\">Stream 부재 / DDR 복사 / CDMA 우선</p>\n            </div>\n            <div class=\"bg-white border border-gray-200 rounded-xl p-4\">\n              <i data-lucide=\"layers\" class=\"w-5 h-5 text-[#8b5cf6] mb-3\"></i>\n              <p class=\"text-[12px] font-bold text-[#191f28]\">Video Frame</p>\n              <p class=\"text-[12px] text-[#4e5968] mt-1\">SOF/EOL / stride / frame sync / VDMA</p>\n            </div>\n            <div class=\"bg-white border border-gray-200 rounded-xl p-4\">\n              <i data-lucide=\"network\" class=\"w-5 h-5 text-orange-600 mb-3\"></i>\n              <p class=\"text-[12px] font-bold text-[#191f28]\">Multi Channel</p>\n              <p class=\"text-[12px] text-[#4e5968] mt-1\">채널별 BD / 독립 status / MCDMA</p>\n            </div>\n            <div class=\"bg-white border border-gray-200 rounded-xl p-4\">\n              <i data-lucide=\"cpu\" class=\"w-5 h-5 text-gray-700 mb-3\"></i>\n              <p class=\"text-[12px] font-bold text-[#191f28]\">Custom Engine</p>\n              <p class=\"text-[12px] text-[#4e5968] mt-1\">Command queue / status / DataMover</p>\n            </div>\n            <div class=\"bg-white border border-gray-200 rounded-xl p-4\">\n              <i data-lucide=\"settings\" class=\"w-5 h-5 text-[#3182f6] mb-3\"></i>\n              <p class=\"text-[12px] font-bold text-[#191f28]\">Buffer Shape</p>\n              <p class=\"text-[12px] text-[#4e5968] mt-1\">단일 버퍼 Simple / 조각 목록 SG</p>\n            </div>\n          </div>\n\n          <div class=\"mt-6 bg-white border border-gray-200 rounded-2xl p-5\">\n            <h4 class=\"font-bold text-[#191f28] mb-4\">DMA 선택을 헷갈리지 않는 2단계 판단법</h4>\n            <div class=\"grid md:grid-cols-2 gap-5\">\n              <div class=\"bg-[#f9fafb] border border-gray-200 rounded-xl p-4\">\n                <p class=\"text-[13px] font-bold text-[#191f28] mb-3 flex items-center gap-2\"><i data-lucide=\"settings\" class=\"w-4 h-4 text-[#3182f6]\"></i>1단계. IP 계열</p>\n                <div class=\"space-y-2 text-[12px] text-[#4e5968]\">\n                  <p><strong class=\"text-blue-700\">Stream 가속기:</strong> AXI DMA</p>\n                  <p><strong class=\"text-green-700\">Memory 복사:</strong> AXI CDMA</p>\n                  <p><strong class=\"text-purple-700\">Video frame:</strong> AXI VDMA</p>\n                  <p><strong class=\"text-orange-700\">Multi-stream:</strong> AXI MCDMA</p>\n                  <p><strong class=\"text-gray-800\">Custom engine:</strong> AXI DataMover</p>\n                </div>\n              </div>\n              <div class=\"bg-[#f9fafb] border border-gray-200 rounded-xl p-4\">\n                <p class=\"text-[13px] font-bold text-[#191f28] mb-3 flex items-center gap-2\"><i data-lucide=\"play\" class=\"w-4 h-4 text-[#8b5cf6]\"></i>2단계. 동작 모드</p>\n                <div class=\"grid md:grid-cols-2 gap-3\">\n                  <div class=\"bg-white border border-gray-200 rounded-xl p-4\">\n                    <p class=\"text-[12px] font-bold text-[#191f28]\">Simple / Direct Register</p>\n                    <p class=\"text-[12px] text-[#4e5968] mt-1\">단일 주소 / 단일 길이 / 1회 전송 / 실습용</p>\n                  </div>\n                  <div class=\"bg-white border border-blue-200 rounded-xl p-4\">\n                    <p class=\"text-[12px] font-bold text-blue-900\">Scatter-Gather</p>\n                    <p class=\"text-[12px] text-blue-800 mt-1\">Descriptor ring / 비연속 버퍼 / 반복 큐 / CPU 개입 감소</p>\n                  </div>\n                </div>\n                <p class=\"text-[12px] text-[#4e5968] mt-3 leading-relaxed\">\n                  <strong class=\"text-[#191f28]\">중요:</strong> Simple/SG는 CDMA/VDMA 같은 “IP 종류”가 아니라 같은 계열 IP 안에서 선택하는 “동작 방식”입니다.\n                </p>\n              </div>\n            </div>\n          </div>\n\n          <div class=\"mt-6 bg-[#fff7ed] border border-orange-200 rounded-2xl p-5\">\n            <h4 class=\"font-bold text-orange-700 mb-4 flex items-center gap-2\"><i data-lucide=\"alert-triangle\" class=\"w-5 h-5\"></i>대표 오선택 사례</h4>\n            <div class=\"grid md:grid-cols-3 gap-3\">\n              <div class=\"bg-white border border-orange-100 rounded-xl p-4\">\n                <i data-lucide=\"server\" class=\"w-5 h-5 text-orange-600 mb-3\"></i>\n                <p class=\"text-[12px] font-bold text-[#191f28]\">DDR A → DDR B 복사</p>\n                <p class=\"text-[12px] text-[#4e5968] mt-1\">AXI DMA 오선택 / CDMA 우선</p>\n              </div>\n              <div class=\"bg-white border border-orange-100 rounded-xl p-4\">\n                <i data-lucide=\"layers\" class=\"w-5 h-5 text-orange-600 mb-3\"></i>\n                <p class=\"text-[12px] font-bold text-[#191f28]\">영상 프레임 전송</p>\n                <p class=\"text-[12px] text-[#4e5968] mt-1\">SOF/EOL/stride 누락 / VDMA 검토</p>\n              </div>\n              <div class=\"bg-white border border-orange-100 rounded-xl p-4\">\n                <i data-lucide=\"settings\" class=\"w-5 h-5 text-orange-600 mb-3\"></i>\n                <p class=\"text-[12px] font-bold text-[#191f28]\">SG IP 제어</p>\n                <p class=\"text-[12px] text-[#4e5968] mt-1\">BD ring 부재 / CURDESC·TAILDESC 누락</p>\n              </div>\n            </div>\n          </div>\n\n          <div class=\"mt-6 bg-[#f9fafb] border border-gray-200 rounded-2xl p-5\">\n            <h4 class=\"font-bold text-[#191f28] mb-4 flex items-center gap-2\"><i data-lucide=\"info\" class=\"w-5 h-5 text-[#3182f6]\"></i>용어와 배경</h4>\n            <div class=\"grid md:grid-cols-2 gap-3\">\n              <div class=\"bg-white border border-gray-200 rounded-xl p-4\">\n                <i data-lucide=\"network\" class=\"w-5 h-5 text-[#3182f6] mb-3\"></i>\n                <p class=\"text-[12px] font-bold text-[#191f28]\">AMBA</p>\n                <p class=\"text-[12px] text-[#4e5968] mt-1\">AXI / AHB / APB / 버스 규격 계열</p>\n              </div>\n              <div class=\"bg-white border border-gray-200 rounded-xl p-4\">\n                <i data-lucide=\"server\" class=\"w-5 h-5 text-green-600 mb-3\"></i>\n                <p class=\"text-[12px] font-bold text-[#191f28]\">AHB DMA 직관</p>\n                <p class=\"text-[12px] text-[#4e5968] mt-1\">SRAM 복사 모델 / AXI DMA와 구분</p>\n              </div>\n              <div class=\"bg-white border border-gray-200 rounded-xl p-4\">\n                <i data-lucide=\"layers\" class=\"w-5 h-5 text-[#8b5cf6] mb-3\"></i>\n                <p class=\"text-[12px] font-bold text-[#191f28]\">LogiCORE</p>\n                <p class=\"text-[12px] text-[#4e5968] mt-1\">AMD/Xilinx IP 제품군 / DMA·CDMA·VDMA</p>\n              </div>\n              <div class=\"bg-white border border-gray-200 rounded-xl p-4\">\n                <i data-lucide=\"cpu\" class=\"w-5 h-5 text-gray-700 mb-3\"></i>\n                <p class=\"text-[12px] font-bold text-[#191f28]\">PrimeCell</p>\n                <p class=\"text-[12px] text-[#4e5968] mt-1\">Arm 주변장치 IP 맥락 / AXI 규격과 분리</p>\n              </div>\n            </div>\n          </div>\n        </div>\n\n        <!-- System Big Picture Diagram -->\n        <h3 class=\"text-xl font-bold text-[#191f28] mb-6\">1.3 SoC 아키텍처 블록 다이어그램</h3>\n        <div class=\"bg-[#f8f9fa] border border-[#e5e8eb] p-6 rounded-xl flex flex-col items-center\">\n          <div class=\"w-full max-w-4xl relative\">\n            <div class=\"flex justify-between items-start mb-0\">\n              <div class=\"w-40 flex flex-col items-center\">\n                <div class=\"w-full bg-white border-[3px] border-[#191f28] rounded-xl p-4 shadow-md text-center z-10 relative\">\n                  <i data-lucide=\"cpu\" class=\"w-8 h-8 text-[#191f28] mx-auto mb-2\"></i>\n                  <span class=\"font-extrabold text-[#191f28] block\">Processor</span>\n                  <span class=\"absolute -right-4 -bottom-4 bg-purple-100 text-purple-700 text-[10px] font-bold px-2 py-1 rounded shadow-sm border border-purple-200\">AXI Master</span>\n                </div>\n                <div class=\"h-28 flex items-center justify-center -mb-2 relative\" style=\"border-left: 4px dashed #8b5cf6;\">\n                  <span class=\"absolute left-4 bg-[#f3e8ff] text-[#7c3aed] text-[10px] font-bold px-2 py-0.5 rounded border border-[#d8b4fe] whitespace-nowrap\">Config (AXI-Lite)</span>\n                </div>\n                <i data-lucide=\"arrow-down\" class=\"w-5 h-5 text-[#8b5cf6] z-10\"></i>\n              </div>\n\n              <div class=\"w-48 flex flex-col items-center\">\n                <div class=\"w-full bg-white border-[3px] border-gray-400 rounded-xl p-4 shadow-md text-center z-10 relative\">\n                  <i data-lucide=\"server\" class=\"w-8 h-8 text-gray-600 mx-auto mb-2\"></i>\n                  <span class=\"font-extrabold text-gray-700 block\">System Memory</span>\n                  <span class=\"absolute -left-4 -bottom-4 bg-gray-100 text-gray-700 text-[10px] font-bold px-2 py-1 rounded shadow-sm border border-gray-300\">AXI Slave</span>\n                </div>\n                <div class=\"flex w-full justify-between mt-2\">\n                  <div class=\"flex flex-col items-center relative\">\n                     <i data-lucide=\"arrow-up\" class=\"w-5 h-5 text-[#3182f6] -mt-1 z-10\"></i>\n                     <div class=\"h-28\" style=\"border-left: 4px solid #3182f6;\"></div>\n                  </div>\n                  <div class=\"flex flex-col items-center relative\">\n                     <i data-lucide=\"arrow-down\" class=\"w-5 h-5 text-[#22c55e] -mt-1 z-10\"></i>\n                     <div class=\"h-28\" style=\"border-left: 4px solid #22c55e;\"></div>\n                  </div>\n                </div>\n              </div>\n            </div>\n\n            <div class=\"w-full h-12 bg-gray-200 border-y-2 border-gray-300 flex items-center justify-center shadow-inner relative rounded\">\n              <span class=\"font-extrabold text-gray-500 tracking-widest uppercase\">AXI Interconnect (System Bus)</span>\n            </div>\n\n            <div class=\"flex justify-between items-start mt-8\">\n              <div class=\"w-[340px] bg-[#eff7ff] border-[3px] border-[#3182f6] rounded-xl p-4 shadow-md z-10 relative\">\n                <div class=\"absolute -top-3 left-6 bg-[#3182f6] text-white text-[10px] font-bold px-2 py-0.5 rounded\">AXI DMA Controller</div>\n                \n                <div class=\"grid grid-cols-2 gap-4 mt-2\">\n                  <div class=\"bg-white border-2 border-purple-400 rounded p-2 text-center shadow-sm relative\">\n                    <span class=\"absolute -top-2 -right-2 bg-purple-500 text-white text-[8px] font-bold px-1 rounded\">Slave</span>\n                    <span class=\"block font-bold text-[#191f28] text-sm\">CSR (Registers)</span>\n                    <span class=\"block text-[10px] text-purple-600\">AXI-Lite 설정 수신</span>\n                  </div>\n                  <div class=\"bg-white border border-gray-200 rounded p-2 text-center shadow-sm\">\n                    <span class=\"block font-bold text-red-500 text-sm\">Interrupts</span>\n                    <span class=\"block text-[10px] text-gray-500\">완료 시 CPU 알림</span>\n                  </div>\n                  <div class=\"bg-white border-2 border-[#3182f6] rounded p-2 text-center shadow-sm flex flex-col justify-center relative\">\n                    <span class=\"absolute -top-2 -right-2 bg-[#3182f6] text-white text-[8px] font-bold px-1 rounded\">Master</span>\n                    <span class=\"block font-extrabold text-[#3182f6] text-sm\">MM2S Engine</span>\n                    <span class=\"block text-[10px] text-gray-500\">AXI4 Full (DDR Read)</span>\n                  </div>\n                  <div class=\"bg-white border-2 border-[#22c55e] rounded p-2 text-center shadow-sm flex flex-col justify-center relative\">\n                    <span class=\"absolute -top-2 -right-2 bg-[#22c55e] text-white text-[8px] font-bold px-1 rounded\">Master</span>\n                    <span class=\"block font-extrabold text-[#22c55e] text-sm\">S2MM Engine</span>\n                    <span class=\"block text-[10px] text-gray-500\">AXI4 Full (DDR Write)</span>\n                  </div>\n                </div>\n              </div>\n\n              <div class=\"flex-1 flex flex-col items-center justify-center relative px-4 mt-12\">\n                <div class=\"w-full h-1.5 bg-[#3182f6] relative flex items-center justify-end mb-4\">\n                  <div class=\"absolute -top-5 text-[10px] font-bold text-[#3182f6]\">M_AXIS_MM2S</div>\n                  <i data-lucide=\"chevron-right\" class=\"text-[#3182f6] -mr-2\"></i>\n                </div>\n                <div class=\"w-full h-1.5 bg-[#22c55e] relative flex items-center justify-start\">\n                  <div class=\"absolute -bottom-5 text-[10px] font-bold text-[#22c55e]\">S_AXIS_S2MM</div>\n                  <i data-lucide=\"chevron-left\" class=\"text-[#22c55e] -ml-2\"></i>\n                </div>\n              </div>\n\n              <div class=\"w-40 flex flex-col items-center mt-6\">\n                <div class=\"w-full bg-[#f4f0ff] border-[3px] border-[#8b5cf6] rounded-xl p-4 shadow-md text-center z-10\">\n                  <i data-lucide=\"layers\" class=\"w-8 h-8 text-[#8b5cf6] mx-auto mb-2\"></i>\n                  <span class=\"font-extrabold text-[#8b5cf6] block leading-tight\">Target HW<br>(e.g. FFT/Filter)</span>\n                  <span class=\"text-[10px] text-gray-500\">(AXI-Stream)</span>\n                </div>\n              </div>\n            </div>\n\n            <!-- Interconnect vertical lines -->\n            <div class=\"absolute left-[64px] top-[108px] h-10 w-1 bg-[#8b5cf6] -z-10\"></div>\n            <div class=\"absolute left-[64px] top-[165px] h-8 w-1 bg-[#8b5cf6] -z-10\"></div>\n            <div class=\"absolute right-[225px] top-[108px] h-10 w-1 bg-[#3182f6] -z-10\"></div>\n            <div class=\"absolute right-[175px] top-[108px] h-10 w-1 bg-[#22c55e] -z-10\"></div>\n            <div class=\"absolute left-[140px] top-[165px] h-32 w-1 bg-[#3182f6] -z-10\"></div>\n            <div class=\"absolute left-[295px] top-[165px] h-32 w-1 bg-[#22c55e] -z-10\"></div>\n          </div>\n        </div>\n        \n        <!-- Note on Central DMA -->\n        <div class=\"mt-6 bg-[#fff7ed] p-5 rounded-xl border border-orange-200\">\n          <h4 class=\"font-bold text-orange-600 text-sm mb-2 flex items-center gap-1\"><i data-lucide=\"info\" class=\"w-4 h-4\"></i> 참고: Memory-to-Memory 전송을 원한다면?</h4>\n          <p class=\"text-[13px] text-gray-700\">\n            만약 하드웨어 IP 없이 <strong>단순히 DDR RAM의 A 영역에서 B 영역으로 메모리를 복사</strong>하고 싶다면, AXI DMA(Stream 기반)가 아닌 <strong>AXI CDMA (Central DMA)</strong>라는 별도의 IP를 사용하는 것이 일반적입니다. CDMA는 스트림 포트 없이 AXI4 Full 인터페이스만으로 메모리 간 복사를 수행합니다.\n          </p>\n        </div>\n      </div>"}, "axi4": {"id": "axi4", "html": "<div class=\"space-y-4 border-b border-gray-200 pb-6\">\n        <span class=\"text-[#3182f6] font-bold text-sm tracking-wide\">Chapter 2. The Power of AXI4 Full</span>\n        <h2 class=\"text-3xl font-extrabold text-[#191f28]\">데이터 고속도로: AXI4 Full Burst 트랜잭션 메커니즘</h2>\n        <p class=\"text-[#4e5968] text-lg\">DMA가 대규모 데이터를 고속 전송할 수 있는 핵심 요인은 CPU의 제어 처리와 AXI4 Burst 데이터 경로를 물리적/논리적으로 완벽히 분리한 아키텍처에 기인합니다.</p>\n      </div>\n\n      <div class=\"grid lg:grid-cols-[1.4fr_1fr] gap-6\">\n        <div class=\"bg-white p-8 rounded-2xl border border-gray-200 shadow-sm\">\n        <h3 class=\"text-xl font-bold text-[#191f28] mb-4\">2.1 MMIO 실행 시퀀스</h3>\n          <div class=\"space-y-4\">\n            <div class=\"bg-[#f9fafb] border border-gray-200 rounded-xl p-4\">\n              <span class=\"text-[11px] font-bold text-purple-600\">STEP 1</span>\n              <p class=\"text-[14px] text-[#191f28] font-semibold mt-1\">CONTROL 레지스터에서 Enable 및 Interrupt Enable 설정</p>\n              <p class=\"text-[13px] text-[#4e5968] mt-1\">DMA 구동 엔진을 활성화합니다. Interrupt Enable을 동시 설정할 경우, 전송 완료 시 CPU가 Polling 없이 비동기 알림(IRQ)을 수신할 수 있습니다.</p>\n            </div>\n            <div class=\"bg-[#f9fafb] border border-gray-200 rounded-xl p-4\">\n              <span class=\"text-[11px] font-bold text-blue-600\">STEP 2</span>\n              <p class=\"text-[14px] text-[#191f28] font-semibold mt-1\">SOURCE / DESTINATION 레지스터 기준 주소 할당</p>\n              <p class=\"text-[13px] text-[#4e5968] mt-1\">단순 Memory-to-Memory 전송 모델에서는 Source와 Destination 모두 System Memory 영역의 주소값을 갖습니다.</p>\n            </div>\n            <div class=\"bg-[#f9fafb] border border-gray-200 rounded-xl p-4\">\n              <span class=\"text-[11px] font-bold text-green-600\">STEP 3</span>\n              <p class=\"text-[14px] text-[#191f28] font-semibold mt-1\">NUM 레지스터를 통한 트랜잭션 파라미터(시작, Chunk, 길이) 설정</p>\n              <p class=\"text-[13px] text-[#4e5968] mt-1\">본격적인 데이터 전송 트리거 시점입니다. Chunk는 연속 Burst의 단위 크기를 의미하며, Length/Bytes 파라미터는 총 전송 바이트 수를 정의합니다.</p>\n            </div>\n            <div class=\"bg-[#f9fafb] border border-gray-200 rounded-xl p-4\">\n              <span class=\"text-[11px] font-bold text-orange-600\">STEP 4</span>\n              <p class=\"text-[14px] text-[#191f28] font-semibold mt-1\">GO/BUSY 플래그 Polling 대기 또는 IRQ 수신 대기</p>\n              <p class=\"text-[13px] text-[#4e5968] mt-1\">펌웨어/드라이버 레벨에서 상태 레지스터의 GO/BUSY 비트 하강(완료)을 반복 확인하거나, 인터럽트 활용 시 Pending 상태와 IRQ 출력을 감지하여 완료를 판별합니다.</p>\n            </div>\n          </div>\n        </div>\n\n        <div class=\"bg-[#191f28] text-white p-8 rounded-2xl shadow-sm\">\n          <h3 class=\"text-xl font-bold mb-4\">2.2 Burst 트랜잭션 설계 주요 항목</h3>\n          <ul class=\"space-y-3 text-[13px] text-gray-200 leading-relaxed\">\n            <li><strong class=\"text-white\">DMA 적용 목적:</strong> CPU 연산 자원 점유를 최소화하고, 단일 명령어 기반 메모리 접근 한계를 극복하여 대역폭 한계까지 Burst 효율을 극대화합니다.</li>\n            <li><strong class=\"text-white\">필수 제어 레지스터:</strong> Source Address, Destination Address, Transfer Length, Chunk Size, DMA Status (Done/Interrupt).</li>\n            <li><strong class=\"text-white\">Chunk 파라미터의 의의:</strong> Chunk는 장주기 Burst를 분할 실행할 단위 크기를 지칭하며, 내부 AXI Data Width와 버퍼(FIFO) Depth 제약을 바탕으로 산출됩니다.</li>\n            <li><strong class=\"text-white\">Address Alignment:</strong> Source와 Destination 간의 정렬 규칙(Alignment)이 부합해야 하며, Misaligned Start 발생 시 내부 FSM(Finite State Machine)이 최상단에서 보정 트랜잭션을 선행 처리합니다.</li>\n            <li><strong class=\"text-white\">주요 검증 요소:</strong> CSR 설정 시퀀스의 유효성 확인, 전송 상태 레지스터(Status) 관측, 그리고 Destination 메모리 영역 값 무결성 점검이 최우선 항목입니다.</li>\n          </ul>\n        </div>\n      </div>\n\n      <div class=\"bg-white p-8 rounded-2xl border border-gray-200 shadow-sm\">\n        <h3 class=\"text-xl font-bold text-[#191f28] mb-4\">2.3 CPU 제어 Sequence (Conceptual Architecture)</h3>\n        <p class=\"text-[14px] text-[#4e5968] mb-4 leading-relaxed\">\n          CPU(또는 BFM)가 DMA 프로세스를 구동하기 위해 요구되는 단계적 레지스터 접근 및 제어 흐름 모델입니다. 각 단계별 CSR 활성화 시점을 논리적으로 분류하였습니다.\n        </p>\n        <div class=\"grid md:grid-cols-5 gap-3 text-center\">\n          <div class=\"bg-[#f3e8ff] border border-purple-200 rounded-xl p-4\">\n            <span class=\"text-[11px] font-bold text-purple-700\">01</span>\n            <p class=\"text-[13px] font-bold text-[#191f28] mt-1\">Enable</p>\n            <p class=\"text-[12px] text-[#4e5968] mt-1\">DMA 동작 허용과 인터럽트 정책 설정</p>\n          </div>\n          <div class=\"bg-[#eff7ff] border border-blue-200 rounded-xl p-4\">\n            <span class=\"text-[11px] font-bold text-blue-700\">02</span>\n            <p class=\"text-[13px] font-bold text-[#191f28] mt-1\">Source</p>\n            <p class=\"text-[12px] text-[#4e5968] mt-1\">읽기 시작 주소를 DMA에 전달</p>\n          </div>\n          <div class=\"bg-[#ecfdf5] border border-green-200 rounded-xl p-4\">\n            <span class=\"text-[11px] font-bold text-green-700\">03</span>\n            <p class=\"text-[13px] font-bold text-[#191f28] mt-1\">Destination</p>\n            <p class=\"text-[12px] text-[#4e5968] mt-1\">쓰기 시작 주소를 DMA에 전달</p>\n          </div>\n          <div class=\"bg-[#fff7ed] border border-orange-200 rounded-xl p-4\">\n            <span class=\"text-[11px] font-bold text-orange-700\">04</span>\n            <p class=\"text-[13px] font-bold text-[#191f28] mt-1\">Start</p>\n            <p class=\"text-[12px] text-[#4e5968] mt-1\">전송 길이와 chunk를 담아 GO 트리거</p>\n          </div>\n          <div class=\"bg-[#f9fafb] border border-gray-200 rounded-xl p-4\">\n            <span class=\"text-[11px] font-bold text-gray-700\">05</span>\n            <p class=\"text-[13px] font-bold text-[#191f28] mt-1\">Observe</p>\n            <p class=\"text-[12px] text-[#4e5968] mt-1\">GO 하강, DONE, IRQ로 완료 확인</p>\n          </div>\n        </div>\n        <div class=\"mt-4 bg-[#f9fafb] border border-gray-200 rounded-xl p-4 text-[13px] text-[#4e5968] leading-relaxed\">\n          <strong class=\"text-[#191f28]\">핵심 규칙:</strong>\n          주소와 길이를 모두 준비한 뒤 마지막에 시작 트리거를 넣습니다. 완료 관찰은 polling 또는 interrupt 중 하나로 할 수 있고, interrupt pending은 별도 clear 단계가 필요합니다.\n        </div>\n      </div>\n\n      <div class=\"bg-white p-8 rounded-2xl border border-gray-200 shadow-sm\">\n        <h3 class=\"text-xl font-bold text-[#191f28] mb-4\">2.4 Driver/Firmware 관점의 제어 알고리즘</h3>\n        <p class=\"text-[14px] text-[#4e5968] mb-5 leading-relaxed\">\n          소프트웨어 스택에서의 실제 제어 코드는 하단 시퀀스로 요약될 수 있습니다. <strong>핵심 원칙은 Destination 및 Source 주소를 선제적으로 매핑한 후, 최종적으로 GO 비트를 트리거하는 것입니다.</strong> \n          이후 GO 비트 하강 감지 또는 Interrupt Pending Flag 확인을 통해 트랜잭션의 정상 종료를 판별합니다.\n        </p>\n        <div class=\"grid md:grid-cols-4 gap-4\">\n          <div class=\"bg-[#f3e8ff] border border-purple-200 rounded-xl p-4\">\n            <span class=\"text-[11px] font-bold text-purple-700\">CONTROL</span>\n            <p class=\"text-[13px] font-bold text-[#191f28] mt-1\">EN/IE 초기화</p>\n            <p class=\"text-[12px] text-[#4e5968] mt-1\">DMA 모듈 활성화와 더불어, 필요 시 트랜잭션 완료 통보용 Interrupt를 허용합니다.</p>\n          </div>\n          <div class=\"bg-[#eff7ff] border border-blue-200 rounded-xl p-4\">\n            <span class=\"text-[11px] font-bold text-blue-700\">ADDRESS</span>\n            <p class=\"text-[13px] font-bold text-[#191f28] mt-1\">DST / SRC 매핑</p>\n            <p class=\"text-[12px] text-[#4e5968] mt-1\">두 메모리 주소 간 하위 비트 Alignment 일치 여부를 사전 검증해야 합니다.</p>\n          </div>\n          <div class=\"bg-[#ecfdf5] border border-green-200 rounded-xl p-4\">\n            <span class=\"text-[11px] font-bold text-green-700\">START</span>\n            <p class=\"text-[13px] font-bold text-[#191f28] mt-1\">트리거 파라미터(GO+CHUNK+BYTES)</p>\n            <p class=\"text-[12px] text-[#4e5968] mt-1\">총 전송 길이와 분할 Burst(Chunk)를 레지스터에 동시 인가하여 기동 조건을 확립합니다.</p>\n          </div>\n          <div class=\"bg-[#fff7ed] border border-orange-200 rounded-xl p-4\">\n            <span class=\"text-[11px] font-bold text-orange-700\">WAIT / CLEAR</span>\n            <p class=\"text-[13px] font-bold text-[#191f28] mt-1\">완료 검증 및 Interrupt Clear</p>\n            <p class=\"text-[12px] text-[#4e5968] mt-1\">트랜잭션 종결 후 발생한 Pending Interrupt는 소프트웨어 계층에서 명시적으로 Clear(1-to-Clear)해야 합니다.</p>\n          </div>\n        </div>\n        <div class=\"mt-5 bg-[#f9fafb] border border-gray-200 rounded-xl p-5\">\n          <p class=\"text-[13px] font-bold text-[#191f28] mb-3\">Pseudo-code</p>\n          <div class=\"grid md:grid-cols-5 gap-2 text-center text-[12px]\">\n            <div class=\"bg-white border border-gray-200 rounded-lg p-3\">enable DMA</div>\n            <div class=\"bg-white border border-gray-200 rounded-lg p-3\">write DST</div>\n            <div class=\"bg-white border border-gray-200 rounded-lg p-3\">write SRC</div>\n            <div class=\"bg-white border border-gray-200 rounded-lg p-3\">write GO/length</div>\n            <div class=\"bg-white border border-gray-200 rounded-lg p-3\">poll or IRQ clear</div>\n          </div>\n        </div>\n      </div>\n\n      <div class=\"bg-white p-8 rounded-2xl border border-[#3182f6] shadow-sm relative overflow-hidden\">\n        <div class=\"absolute -right-10 -top-10 w-40 h-40 bg-blue-50 rounded-full blur-3xl -z-10\"></div>\n        <h3 class=\"text-xl font-bold text-[#191f28] mb-4 flex items-center gap-2\">\n          <i data-lucide=\"zap\" class=\"w-6 h-6 text-[#3182f6]\"></i> 2.5 AXI-Lite와 AXI4 Full 인터페이스의 본질적 차이\n        </h3>\n        <div class=\"grid md:grid-cols-2 gap-6 mt-4\">\n          <div class=\"bg-[#f9fafb] p-6 rounded-xl border border-gray-200\">\n            <h4 class=\"font-bold text-purple-600 mb-2\">AXI-Lite (Control Pathway)</h4>\n            <p class=\"text-[13px] text-gray-600 leading-relaxed\">\n              <strong>1주소 : 1데이터 전송 (Single Access).</strong> CPU(Master)가 DMA 내부 설정용 레지스터(Slave CSR)에 단일 값을 쓰고 읽는 경로입니다.\n            </p>\n          </div>\n          <div class=\"bg-[#eff7ff] p-6 rounded-xl border border-blue-200\">\n            <h4 class=\"font-bold text-[#3182f6] mb-2\">AXI4 Full (Data Pathway)</h4>\n            <p class=\"text-[13px] text-gray-700 leading-relaxed\">\n              <strong>1주소 : N데이터 연속 전송 (Burst Access).</strong> DMA(Master)가 System Memory(Slave)에 연속적인 데이터 페이로드를 요청하는 경로로, 1회의 주소 전달 시 최대 256 beat에 이르는 대용량 데이터를 처리합니다.\n            </p>\n          </div>\n        </div>\n\n        <div class=\"mt-10 bg-[#f9fafb] border border-gray-200 rounded-2xl p-6\">\n          <h3 class=\"text-xl font-bold text-[#191f28] mb-3\">2.6 AXI4 Specification 기반 Burst 타이밍 해석</h3>\n          <p class=\"text-[14px] text-[#4e5968] mb-5 leading-relaxed\">\n            AXI4 프로토콜은 5개의 통신 채널이 상호 독립적인 Handshake를 수행합니다. 전 채널을 관통하는 최상위 원칙은\n            <strong>VALID 신호와 READY 신호가 동일한 ACLK Rising Edge에서 동시에 Assert(High)된 시점에만 유효한 트랜잭션이 성립</strong>한다는 것입니다.\n            다음 다이어그램은 AMBA 공식 사양의 타이밍 차트를 재구성한 것으로, DMA 하드웨어가 어떻게 다중 Read/Write 요청을 Overlap하여 처리 성능을 극대화하는지 설명합니다.\n          </p>\n\n          <div class=\"space-y-5 mb-6\">\n            <div class=\"bg-white border border-gray-200 rounded-xl p-4\">\n              <p class=\"text-[13px] font-bold text-[#191f28] mb-2\">Read dependency</p>\n              <svg viewBox=\"0 0 900 260\" role=\"img\" aria-label=\"AXI read transaction handshake dependencies\" style=\"display:block;width:100%;height:auto;\">\n                <defs>\n                  <marker id=\"read-dep-arrow\" markerWidth=\"13\" markerHeight=\"10\" refX=\"12\" refY=\"5\" orient=\"auto\">\n                    <path d=\"M0,0 L13,5 L0,10 Z\" fill=\"#2b3038\"></path>\n                  </marker>\n                  <marker id=\"read-dep-double-arrow\" markerWidth=\"22\" markerHeight=\"10\" refX=\"21\" refY=\"5\" orient=\"auto\">\n                    <path d=\"M0,0 L11,5 L0,10 Z M10,0 L21,5 L10,10 Z\" fill=\"#2b3038\"></path>\n                  </marker>\n                </defs>\n                <rect x=\"0\" y=\"0\" width=\"900\" height=\"260\" rx=\"14\" fill=\"#ffffff\"></rect>\n                <g font-family=\"Pretendard, system-ui, sans-serif\" font-weight=\"800\">\n                  <text x=\"46\" y=\"78\" fill=\"#9f3a3a\" font-size=\"32\">M</text>\n                  <text x=\"118\" y=\"78\" fill=\"#2b3038\" font-size=\"34\">ARVALID</text>\n                  <text x=\"560\" y=\"78\" fill=\"#2b3038\" font-size=\"34\">RVALID</text>\n                  <text x=\"724\" y=\"78\" fill=\"#3155ff\" font-size=\"32\">S</text>\n                  <text x=\"240\" y=\"210\" fill=\"#3155ff\" font-size=\"32\">S</text>\n                  <text x=\"310\" y=\"210\" fill=\"#2b3038\" font-size=\"34\">ARREADY</text>\n                  <text x=\"620\" y=\"210\" fill=\"#2b3038\" font-size=\"34\">RREADY</text>\n                  <text x=\"805\" y=\"210\" fill=\"#9f3a3a\" font-size=\"32\">M</text>\n                </g>\n                <g stroke=\"#2b3038\" stroke-width=\"3\" fill=\"none\" stroke-linecap=\"round\">\n                  <path d=\"M300 66 H530\" marker-end=\"url(#read-dep-double-arrow)\"></path>\n                  <path d=\"M250 92 L292 178\" marker-end=\"url(#read-dep-arrow)\"></path>\n                  <path d=\"M505 178 L548 92\" marker-end=\"url(#read-dep-double-arrow)\"></path>\n                  <path d=\"M680 92 L728 178\" marker-end=\"url(#read-dep-arrow)\"></path>\n                </g>\n              </svg>\n              <p class=\"text-[12px] text-[#4e5968] leading-relaxed\">\n                Master 측에서 주소 유효(ARVALID)를 선언하면 Slave 측이 수락(ARREADY)하여 연결이 수립됩니다. 이후 Slave가 반환(RVALID)하는 데이터 채널에서는 Master의 수락(RREADY) 시점에 구동되며 사이클이 소진(Beat 소비)됩니다.\n              </p>\n            </div>\n\n            <div class=\"bg-white border border-gray-200 rounded-xl p-4\">\n              <p class=\"text-[13px] font-bold text-[#191f28] mb-2\">Write dependency</p>\n              <svg viewBox=\"0 0 1000 300\" role=\"img\" aria-label=\"AXI write transaction handshake dependencies\" style=\"display:block;width:100%;height:auto;\">\n                <defs>\n                  <marker id=\"write-dep-arrow\" markerWidth=\"13\" markerHeight=\"10\" refX=\"12\" refY=\"5\" orient=\"auto\">\n                    <path d=\"M0,0 L13,5 L0,10 Z\" fill=\"#2b3038\"></path>\n                  </marker>\n                  <marker id=\"write-dep-double-arrow\" markerWidth=\"22\" markerHeight=\"10\" refX=\"21\" refY=\"5\" orient=\"auto\">\n                    <path d=\"M0,0 L11,5 L0,10 Z M10,0 L21,5 L10,10 Z\" fill=\"#2b3038\"></path>\n                  </marker>\n                </defs>\n                <rect x=\"0\" y=\"0\" width=\"1000\" height=\"300\" rx=\"14\" fill=\"#ffffff\"></rect>\n                <g font-family=\"Pretendard, system-ui, sans-serif\" font-weight=\"800\">\n                  <text x=\"34\" y=\"72\" fill=\"#9f3a3a\" font-size=\"32\">M</text>\n                  <text x=\"86\" y=\"72\" fill=\"#2b3038\" font-size=\"34\">AWVALID</text>\n                  <text x=\"300\" y=\"72\" fill=\"#9f3a3a\" font-size=\"32\">M</text>\n                  <text x=\"354\" y=\"72\" fill=\"#2b3038\" font-size=\"34\">WVALID</text>\n                  <text x=\"640\" y=\"72\" fill=\"#2b3038\" font-size=\"34\">BVALID</text>\n                  <text x=\"790\" y=\"72\" fill=\"#3155ff\" font-size=\"32\">S</text>\n                  <text x=\"180\" y=\"228\" fill=\"#3155ff\" font-size=\"32\">S</text>\n                  <text x=\"240\" y=\"228\" fill=\"#2b3038\" font-size=\"34\">AWREADY</text>\n                  <text x=\"465\" y=\"228\" fill=\"#3155ff\" font-size=\"32\">S</text>\n                  <text x=\"525\" y=\"228\" fill=\"#2b3038\" font-size=\"34\">WREADY</text>\n                  <text x=\"760\" y=\"228\" fill=\"#2b3038\" font-size=\"34\">BREADY</text>\n                  <text x=\"930\" y=\"228\" fill=\"#9f3a3a\" font-size=\"32\">M</text>\n                </g>\n                <g stroke=\"#2b3038\" stroke-width=\"3\" fill=\"none\" stroke-linecap=\"round\">\n                  <path d=\"M188 88 L248 195\" marker-end=\"url(#write-dep-arrow)\"></path>\n                  <path d=\"M215 84 L558 195\" marker-end=\"url(#write-dep-arrow)\"></path>\n                  <path d=\"M408 88 L330 195\" marker-end=\"url(#write-dep-arrow)\"></path>\n                  <path d=\"M438 88 L580 195\" marker-end=\"url(#write-dep-arrow)\"></path>\n                  <path d=\"M505 60 H620\" marker-end=\"url(#write-dep-double-arrow)\"></path>\n                  <path d=\"M665 196 L690 92\" marker-end=\"url(#write-dep-double-arrow)\"></path>\n                  <path d=\"M740 92 L812 195\" marker-end=\"url(#write-dep-arrow)\"></path>\n                </g>\n              </svg>\n              <p class=\"text-[12px] text-[#4e5968] leading-relaxed\">\n                Write 사이클은 주소(AW) Handshake와 데이터(W) Handshake 양측이 완전하게 충족되어야 정상 처리됩니다. Slave는 마지막 데이터 블록(WLAST) 수신 후 응답 채널(BVALID)을 통해 쓰기 완료 상태의 건전성을 통지합니다.\n              </p>\n            </div>\n\n            <div class=\"bg-white border border-gray-200 rounded-xl px-4 py-3\">\n              <p class=\"text-[11px] text-[#4e5968] leading-relaxed\">\n                <strong class=\"text-[#191f28]\">화살표 읽는 법:</strong>\n                <span class=\"inline-flex items-center gap-1 mx-1\">\n                  <svg width=\"42\" height=\"10\" viewBox=\"0 0 42 10\" aria-hidden=\"true\"><path d=\"M1 5 H31\" stroke=\"#2b3038\" stroke-width=\"2\" marker-end=\"url(#legend-single-arrow)\"></path><defs><marker id=\"legend-single-arrow\" markerWidth=\"10\" markerHeight=\"8\" refX=\"9\" refY=\"4\" orient=\"auto\"><path d=\"M0,0 L10,4 L0,8 Z\" fill=\"#2b3038\"></path></marker></defs></svg>\n                  <span>단일 화살표는 끝 신호가 시작 신호 전/후 어느 쪽에서도 assert될 수 있음을 의미합니다.</span>\n                </span>\n                <span class=\"inline-flex items-center gap-1 mx-1\">\n                  <svg width=\"46\" height=\"10\" viewBox=\"0 0 46 10\" aria-hidden=\"true\"><path d=\"M1 5 H31\" stroke=\"#2b3038\" stroke-width=\"2\" marker-end=\"url(#legend-double-arrow)\"></path><defs><marker id=\"legend-double-arrow\" markerWidth=\"18\" markerHeight=\"8\" refX=\"17\" refY=\"4\" orient=\"auto\"><path d=\"M0,0 L9,4 L0,8 Z M8,0 L17,4 L8,8 Z\" fill=\"#2b3038\"></path></marker></defs></svg>\n                  <span>이중 화살표는 끝 신호가 시작 신호 assert 이후에만 assert될 수 있는 필수 선행 조건입니다.</span>\n                </span>\n              </p>\n            </div>\n          </div>\n\n          <div class=\"bg-white border border-gray-200 rounded-xl p-4 mb-6\">\n            <div class=\"flex items-center justify-between gap-4 mb-3\">\n              <div>\n                <p class=\"text-[13px] font-bold text-[#191f28]\">Overlapping Read Bursts</p>\n                <p class=\"text-[12px] text-[#4e5968] mt-1\">주소 burst A와 B가 먼저 겹쳐 들어가고, R 채널에서는 slave가 준비되는 순서대로 data beat와 RLAST를 반환합니다.</p>\n              </div>\n              <span class=\"shrink-0 text-[11px] font-bold text-[#3182f6] bg-[#eff7ff] border border-blue-200 rounded-full px-3 py-1\">AR / R channel</span>\n            </div>\n            <div class=\"wide-visual\">\n              <svg class=\"wide-visual-canvas\" viewBox=\"0 0 960 360\" role=\"img\" aria-label=\"AXI overlapping read bursts timing\" style=\"display:block;margin:0 auto;\">\n                <rect x=\"10\" y=\"10\" width=\"940\" height=\"340\" rx=\"14\" fill=\"#ffffff\" stroke=\"#e5e8eb\"></rect>\n                <text x=\"480\" y=\"42\" text-anchor=\"middle\" fill=\"#23238f\" font-size=\"24\" font-weight=\"900\" letter-spacing=\"1.5\">Overlapping Read Bursts</text>\n                <g font-size=\"12\" fill=\"#4e5968\" text-anchor=\"middle\">\n                  <text x=\"170\" y=\"78\">T0</text><text x=\"230\" y=\"78\">T1</text><text x=\"290\" y=\"78\">T2</text><text x=\"350\" y=\"78\">T3</text><text x=\"410\" y=\"78\">T4</text><text x=\"470\" y=\"78\">T5</text><text x=\"530\" y=\"78\">T6</text><text x=\"590\" y=\"78\">T7</text><text x=\"650\" y=\"78\">T8</text><text x=\"710\" y=\"78\">T9</text><text x=\"770\" y=\"78\">T10</text><text x=\"830\" y=\"78\">T11</text>\n                </g>\n                <g stroke=\"#d1d5db\" stroke-width=\"1\">\n                  <line x1=\"170\" y1=\"86\" x2=\"170\" y2=\"320\"></line><line x1=\"230\" y1=\"86\" x2=\"230\" y2=\"320\"></line><line x1=\"290\" y1=\"86\" x2=\"290\" y2=\"320\"></line><line x1=\"350\" y1=\"86\" x2=\"350\" y2=\"320\"></line><line x1=\"410\" y1=\"86\" x2=\"410\" y2=\"320\"></line><line x1=\"470\" y1=\"86\" x2=\"470\" y2=\"320\"></line><line x1=\"530\" y1=\"86\" x2=\"530\" y2=\"320\"></line><line x1=\"590\" y1=\"86\" x2=\"590\" y2=\"320\"></line><line x1=\"650\" y1=\"86\" x2=\"650\" y2=\"320\"></line><line x1=\"710\" y1=\"86\" x2=\"710\" y2=\"320\"></line><line x1=\"770\" y1=\"86\" x2=\"770\" y2=\"320\"></line><line x1=\"830\" y1=\"86\" x2=\"830\" y2=\"320\"></line>\n                </g>\n                <g font-size=\"14\" font-weight=\"800\">\n                  <text x=\"42\" y=\"115\" fill=\"#9f3a3a\">M</text><text x=\"80\" y=\"115\" fill=\"#191f28\">ARADDR</text>\n                  <text x=\"42\" y=\"150\" fill=\"#9f3a3a\">M</text><text x=\"80\" y=\"150\" fill=\"#191f28\">ARVALID</text>\n                  <text x=\"42\" y=\"185\" fill=\"#2563eb\">S</text><text x=\"80\" y=\"185\" fill=\"#191f28\">ARREADY</text>\n                  <text x=\"42\" y=\"220\" fill=\"#2563eb\">S</text><text x=\"80\" y=\"220\" fill=\"#191f28\">RDATA</text>\n                  <text x=\"42\" y=\"255\" fill=\"#2563eb\">S</text><text x=\"80\" y=\"255\" fill=\"#191f28\">RLAST</text>\n                  <text x=\"42\" y=\"290\" fill=\"#2563eb\">S</text><text x=\"80\" y=\"290\" fill=\"#191f28\">RVALID</text>\n                  <text x=\"42\" y=\"325\" fill=\"#9f3a3a\">M</text><text x=\"80\" y=\"325\" fill=\"#191f28\">RREADY</text>\n                </g>\n                <g stroke=\"#191f28\" stroke-width=\"2\" fill=\"none\" stroke-linejoin=\"round\">\n                  <polyline points=\"160,105 190,105 198,118 290,118 298,105 318,105 326,118 430,118 438,105 900,105\"></polyline>\n                  <polyline points=\"160,140 180,140 186,128 420,128 426,140 900,140\"></polyline>\n                  <polyline points=\"160,175 190,175 196,187 245,187 252,175 315,175 322,187 370,187 378,175 900,175\"></polyline>\n                  <polyline points=\"160,210 370,210 378,198 430,198 438,210 560,210 568,198 620,198 628,210 680,210 688,198 740,198 748,210 795,210 803,198 855,198 863,210 900,210\"></polyline>\n                  <polyline points=\"160,245 660,245 666,233 720,233 728,245 840,245 846,233 900,233\"></polyline>\n                  <polyline points=\"160,280 360,280 366,268 420,268 426,280 540,280 546,268 600,268 606,280 660,280 666,268 780,268 786,280 835,280 841,268 900,268\"></polyline>\n                  <polyline points=\"160,315 310,315 316,303 430,303 436,315 500,315 506,303 900,303\"></polyline>\n                </g>\n                <g fill=\"#f3f4f6\" stroke=\"#6b7280\" stroke-width=\"1.5\" font-size=\"13\" font-weight=\"800\" text-anchor=\"middle\">\n                  <rect x=\"198\" y=\"96\" width=\"92\" height=\"26\"></rect><text x=\"244\" y=\"114\" fill=\"#191f28\">A</text>\n                  <rect x=\"326\" y=\"96\" width=\"104\" height=\"26\"></rect><text x=\"378\" y=\"114\" fill=\"#191f28\">B</text>\n                  <rect x=\"378\" y=\"196\" width=\"60\" height=\"26\"></rect><text x=\"408\" y=\"214\" fill=\"#191f28\">D(A0)</text>\n                  <rect x=\"568\" y=\"196\" width=\"60\" height=\"26\"></rect><text x=\"598\" y=\"214\" fill=\"#191f28\">D(A1)</text>\n                  <rect x=\"688\" y=\"196\" width=\"60\" height=\"26\"></rect><text x=\"718\" y=\"214\" fill=\"#191f28\">D(A2)</text>\n                  <rect x=\"803\" y=\"196\" width=\"60\" height=\"26\"></rect><text x=\"833\" y=\"214\" fill=\"#191f28\">D(B0)</text>\n                </g>\n              </svg>\n            </div>\n          </div>\n\n          <div class=\"bg-white border border-gray-200 rounded-xl p-4\">\n            <div class=\"flex items-center justify-between gap-4 mb-3\">\n              <div>\n                <p class=\"text-[13px] font-bold text-[#191f28]\">Write Burst</p>\n                <p class=\"text-[12px] text-[#4e5968] mt-1\">AW 주소 채널과 W 데이터 채널은 별도로 handshake되며, 마지막 W beat의 WLAST 이후 B 채널에서 OKAY 응답이 반환됩니다.</p>\n              </div>\n              <span class=\"shrink-0 text-[11px] font-bold text-[#22c55e] bg-[#ecfdf5] border border-green-200 rounded-full px-3 py-1\">AW / W / B channel</span>\n            </div>\n            <div class=\"wide-visual\">\n              <svg class=\"wide-visual-canvas\" viewBox=\"0 0 960 390\" role=\"img\" aria-label=\"AXI write burst timing\" style=\"display:block;margin:0 auto;\">\n
