         <rect x=\"10\" y=\"10\" width=\"940\" height=\"370\" rx=\"14\" fill=\"#ffffff\" stroke=\"#e5e8eb\"></rect>\n                <text x=\"480\" y=\"42\" text-anchor=\"middle\" fill=\"#23238f\" font-size=\"24\" font-weight=\"900\" letter-spacing=\"1.5\">Write Burst</text>\n                <g font-size=\"12\" fill=\"#4e5968\" text-anchor=\"middle\">\n                  <text x=\"170\" y=\"78\">T0</text><text x=\"240\" y=\"78\">T1</text><text x=\"310\" y=\"78\">T2</text><text x=\"380\" y=\"78\">T3</text><text x=\"450\" y=\"78\">T4</text><text x=\"520\" y=\"78\">T5</text><text x=\"590\" y=\"78\">T6</text><text x=\"660\" y=\"78\">T7</text><text x=\"730\" y=\"78\">T8</text><text x=\"800\" y=\"78\">T9</text><text x=\"870\" y=\"78\">T10</text>\n                </g>\n                <g stroke=\"#d1d5db\" stroke-width=\"1\">\n                  <line x1=\"170\" y1=\"86\" x2=\"170\" y2=\"350\"></line><line x1=\"240\" y1=\"86\" x2=\"240\" y2=\"350\"></line><line x1=\"310\" y1=\"86\" x2=\"310\" y2=\"350\"></line><line x1=\"380\" y1=\"86\" x2=\"380\" y2=\"350\"></line><line x1=\"450\" y1=\"86\" x2=\"450\" y2=\"350\"></line><line x1=\"520\" y1=\"86\" x2=\"520\" y2=\"350\"></line><line x1=\"590\" y1=\"86\" x2=\"590\" y2=\"350\"></line><line x1=\"660\" y1=\"86\" x2=\"660\" y2=\"350\"></line><line x1=\"730\" y1=\"86\" x2=\"730\" y2=\"350\"></line><line x1=\"800\" y1=\"86\" x2=\"800\" y2=\"350\"></line><line x1=\"870\" y1=\"86\" x2=\"870\" y2=\"350\"></line>\n                </g>\n                <g font-size=\"14\" font-weight=\"800\">\n                  <text x=\"42\" y=\"112\" fill=\"#9f3a3a\">M</text><text x=\"82\" y=\"112\" fill=\"#191f28\">AWADDR</text>\n                  <text x=\"42\" y=\"145\" fill=\"#9f3a3a\">M</text><text x=\"82\" y=\"145\" fill=\"#191f28\">AWVALID</text>\n                  <text x=\"42\" y=\"178\" fill=\"#2563eb\">S</text><text x=\"82\" y=\"178\" fill=\"#191f28\">AWREADY</text>\n                  <text x=\"42\" y=\"211\" fill=\"#9f3a3a\">M</text><text x=\"82\" y=\"211\" fill=\"#191f28\">WDATA</text>\n                  <text x=\"42\" y=\"244\" fill=\"#9f3a3a\">M</text><text x=\"82\" y=\"244\" fill=\"#191f28\">WLAST</text>\n                  <text x=\"42\" y=\"277\" fill=\"#9f3a3a\">M</text><text x=\"82\" y=\"277\" fill=\"#191f28\">WVALID</text>\n                  <text x=\"42\" y=\"310\" fill=\"#2563eb\">S</text><text x=\"82\" y=\"310\" fill=\"#191f28\">WREADY</text>\n                  <text x=\"42\" y=\"343\" fill=\"#2563eb\">S</text><text x=\"82\" y=\"343\" fill=\"#191f28\">BVALID</text>\n                </g>\n                <g stroke=\"#191f28\" stroke-width=\"2\" fill=\"none\" stroke-linejoin=\"round\">\n                  <polyline points=\"160,102 190,102 198,115 310,115 318,102 900,102\"></polyline>\n                  <polyline points=\"160,135 185,135 191,123 315,123 321,135 900,135\"></polyline>\n                  <polyline points=\"160,168 195,168 201,180 248,180 254,168 318,168 324,180 900,180\"></polyline>\n                  <polyline points=\"160,201 330,201 338,188 465,188 473,201 480,201 488,188 605,188 613,201 620,201 628,188 735,188 743,201 750,201 758,188 830,188 838,201 900,201\"></polyline>\n                  <polyline points=\"160,234 735,234 742,221 825,221 832,234 900,234\"></polyline>\n                  <polyline points=\"160,267 330,267 336,255 600,255 606,267 660,267 666,255 825,255 831,267 900,267\"></polyline>\n                  <polyline points=\"160,300 400,300 406,288 470,288 476,300 540,300 546,288 825,288 831,300 900,300\"></polyline>\n                  <polyline points=\"160,333 820,333 826,320 885,320 891,333 900,333\"></polyline>\n                </g>\n                <g fill=\"#f3f4f6\" stroke=\"#6b7280\" stroke-width=\"1.5\" font-size=\"13\" font-weight=\"800\" text-anchor=\"middle\">\n                  <rect x=\"198\" y=\"93\" width=\"112\" height=\"26\"></rect><text x=\"254\" y=\"111\" fill=\"#191f28\">A</text>\n                  <rect x=\"338\" y=\"189\" width=\"128\" height=\"26\"></rect><text x=\"402\" y=\"207\" fill=\"#191f28\">D(A0)</text>\n                  <rect x=\"488\" y=\"189\" width=\"118\" height=\"26\"></rect><text x=\"547\" y=\"207\" fill=\"#191f28\">D(A1)</text>\n                  <rect x=\"628\" y=\"189\" width=\"108\" height=\"26\"></rect><text x=\"682\" y=\"207\" fill=\"#191f28\">D(A2)</text>\n                  <rect x=\"758\" y=\"189\" width=\"72\" height=\"26\"></rect><text x=\"794\" y=\"207\" fill=\"#191f28\">D(A3)</text>\n                  <rect x=\"826\" y=\"321\" width=\"60\" height=\"24\"></rect><text x=\"856\" y=\"338\" fill=\"#191f28\">OKAY</text>\n                </g>\n              </svg>\n            </div>\n          </div>\n\n          <div class=\"grid md:grid-cols-3 gap-4 mt-5\">\n            <div class=\"bg-[#eff7ff] border border-blue-200 rounded-xl p-4\">\n              <p class=\"text-[13px] font-bold text-blue-900\">Read Burst Overlap</p>\n              <p class=\"text-[12px] text-blue-800 mt-1 leading-relaxed\">AR 채널을 통해 다중 주소 트랜잭션을 선행 인가(Pipelining)하면, R 채널은 Slave 준비 상태에 따라 시분할로 데이터를 반환하므로 Throughput 최적화가 가능합니다.</p>\n            </div>\n            <div class=\"bg-[#ecfdf5] border border-green-200 rounded-xl p-4\">\n              <p class=\"text-[13px] font-bold text-green-900\">Write Response 조건</p>\n              <p class=\"text-[12px] text-green-800 mt-1 leading-relaxed\">BVALID는 AW Handshake와 전체 W Data Beat의 Handshake가 완전히 종료된 이후에만 유효성을 가집니다. 패킷 종단은 WLAST 신호로 식별됩니다.</p>\n            </div>\n            <div class=\"bg-[#fff7ed] border border-orange-200 rounded-xl p-4\">\n              <p class=\"text-[13px] font-bold text-orange-900\">DMA 아키텍처 설계 포인트</p>\n              <p class=\"text-[12px] text-orange-800 mt-1 leading-relaxed\">Read 코어와 Write 코어를 분리하고 중간에 Asynchronous/Synchronous FIFO를 배치함으로써, Backpressure 상황에서도 양측 버스트 효율 저하를 방지할 수 있습니다.</p>\n            </div>\n          </div>\n        </div>\n\n        <h3 class=\"text-xl font-bold text-[#191f28] mt-10 mb-6\">2.7 AXI4 개별 채널 동적 타이밍 시뮬레이션</h3>\n        <p class=\"text-sm text-[#4e5968] mb-6\">AMBA AXI4 사양은 구동 주소, 기록 데이터, 기록 응답, 독출 주소, 독출 데이터의 5개 채널을 완전 독립적으로 운영합니다. 고성능 DMA는 해당 특성을 활용하여 내부 Read/Write 파이프라인을 이원화합니다.</p>\n        \n        <div class=\"flex gap-4 mb-6\">\n          <button onclick=\"runAxiReadBurst()\" id=\"btn-axi-read\" class=\"bg-[#3182f6] hover:bg-blue-600 text-white px-5 py-2.5 rounded-xl font-bold text-sm flex items-center gap-2 transition-all active:scale-95 shadow-md\">\n            <i data-lucide=\"download\" class=\"w-4 h-4\"></i> Read Burst 실행 (AR, R 채널)\n          </button>\n          <button onclick=\"runAxiWriteBurst()\" id=\"btn-axi-write\" class=\"bg-[#22c55e] hover:bg-green-600 text-white px-5 py-2.5 rounded-xl font-bold text-sm flex items-center gap-2 transition-all active:scale-95 shadow-md\">\n            <i data-lucide=\"upload\" class=\"w-4 h-4\"></i> Write Burst 실행 (AW, W, B 채널)\n          </button>\n        </div>\n\n        <!-- AXI Transaction Animation Canvas -->\n        <div class=\"wide-visual\">\n        <div class=\"wide-visual-canvas bg-[#191f28] p-8 rounded-xl relative overflow-hidden h-[360px] flex justify-between items-center text-white border border-gray-800\">\n          <div class=\"w-32 h-48 bg-gray-800 border-2 border-gray-600 rounded-xl flex flex-col items-center justify-center z-20 shadow-[0_0_15px_rgba(0,0,0,0.5)]\">\n            <span class=\"font-extrabold text-[#3182f6]\">DMA Core</span>\n            <span class=\"text-xs text-gray-400 mt-1\">AXI4 Master</span>\n          </div>\n\n          <div class=\"flex-1 h-full relative\" id=\"axi-channels-container\">\n            <div class=\"absolute top-[20%] w-full h-px bg-gray-700 border-b border-dashed border-gray-600\"></div>\n            <div class=\"absolute top-[35%] w-full h-px bg-gray-700 border-b border-dashed border-gray-600\"></div>\n            <div class=\"absolute top-[50%] w-full h-px bg-gray-700 border-b border-dashed border-gray-600\"></div>\n            <div class=\"absolute top-[65%] w-full h-px bg-gray-700 border-b border-dashed border-gray-600\"></div>\n            <div class=\"absolute top-[80%] w-full h-px bg-gray-700 border-b border-dashed border-gray-600\"></div>\n            \n            <div class=\"absolute left-4 top-[15%] text-[10px] font-bold text-blue-400\">AR (Read Address)</div>\n            <div class=\"absolute right-4 top-[30%] text-[10px] font-bold text-blue-300\">R (Read Data)</div>\n            <div class=\"absolute left-4 top-[45%] text-[10px] font-bold text-green-400\">AW (Write Address)</div>\n            <div class=\"absolute left-4 top-[60%] text-[10px] font-bold text-green-300\">W (Write Data)</div>\n            <div class=\"absolute right-4 top-[75%] text-[10px] font-bold text-red-400\">B (Write Response)</div>\n\n            <div id=\"packet-layer\" class=\"absolute inset-0 pointer-events-none\"></div>\n\n            <div id=\"axi-status-box\" class=\"absolute top-4 left-1/2 -translate-x-1/2 bg-white/10 border border-white/20 backdrop-blur-sm px-4 py-2 rounded-lg text-sm font-bold text-center opacity-0 transition-opacity\">\n              Status\n            </div>\n          </div>\n\n          <div class=\"w-32 h-48 bg-gray-800 border-2 border-gray-600 rounded-xl flex flex-col items-center justify-center z-20 shadow-[0_0_15px_rgba(0,0,0,0.5)]\">\n            <span class=\"font-extrabold text-gray-300\">DDR Memory</span>\n            <span class=\"text-xs text-gray-500 mt-1\">AXI4 Slave</span>\n          </div>\n        </div>\n        </div>\n      </div>"}, "axi": {"id": "axi", "html": "<div class=\"space-y-4 border-b border-gray-200 pb-6\">\n        <span class=\"text-[#3182f6] font-bold text-sm tracking-wide\">Chapter 3. AMBA AXI-Stream Protocol</span>\n        <h2 class=\"text-3xl font-extrabold text-[#191f28]\">Address-Free Data Pipeline 아키텍처</h2>\n        <p class=\"text-[#4e5968] text-lg\">AXI4 Full 사양이 메모리 주소 기반의 범용 트랜잭션을 규정한다면, AXI-Stream은 VALID/READY Handshake와 Packet Boundary 지시자만을 활용하여 대역폭 한계까지 직렬화된 데이터를 전송하는 단방향 고속 인터페이스입니다.</p>\n      </div>\n\n      <div class=\"bg-white p-8 rounded-2xl border border-gray-200 shadow-sm\">\n        <h3 class=\"text-xl font-bold text-[#191f28] mb-4\">3.1 AXI-Stream 확장 이전의 코어 엔진 아키텍처</h3>\n        <div class=\"grid md:grid-cols-3 gap-5\">\n          <div class=\"bg-[#eff7ff] border border-blue-200 rounded-xl p-5\">\n            <h4 class=\"font-bold text-blue-900\">Read Core</h4>\n            <p class=\"text-[13px] text-blue-800 mt-2 leading-relaxed\">Source Base Address를 기점으로 제한된 크기의 AR/R 채널 트랜잭션을 순차 생성합니다. Misaligned Access 발생 시, Boundary 맞춤 연산을 선행한 후 Aligned Bulk Burst 모드로 자동 전환됩니다.</p>\n          </div>\n          <div class=\"bg-[#f9fafb] border border-gray-200 rounded-xl p-5\">\n            <h4 class=\"font-bold text-[#191f28]\">Synchronous FIFO</h4>\n            <p class=\"text-[13px] text-[#4e5968] mt-2 leading-relaxed\">Read Pipeline과 Write Pipeline 간의 시간적 역학(Temporal Dynamics) 차이를 보상하는 비동기/동기 버퍼입니다. 통신 응답 지연에 따른 Backpressure가 전체 시스템을 즉각 구속하지 않도록 완충 작용을 수행합니다.</p>\n          </div>\n          <div class=\"bg-[#ecfdf5] border border-green-200 rounded-xl p-5\">\n            <h4 class=\"font-bold text-green-900\">Write Core</h4>\n            <p class=\"text-[13px] text-green-800 mt-2 leading-relaxed\">FIFO 버퍼에서 인출한 페이로드를 바탕으로 Destination 메모리에 대응하는 AW/W/B 채널 신호를 합성합니다. 시작 주소 정렬 여부를 판단하여 부분 기록(Partial Write)과 정규 기록단계를 스케줄링합니다.</p>\n          </div>\n        </div>\n\n        <div class=\"mt-6 overflow-x-auto\">\n          <table class=\"data-table\">\n            <thead>\n              <tr>\n                <th>구성요소</th>\n                <th>대표 상태</th>\n                <th>핵심 역할</th>\n              </tr>\n            </thead>\n            <tbody>\n              <tr>\n                <td><strong>Read Engine</strong></td>\n                <td>IDLE, UNALIGNED_ALIGN, ALIGNED_BURST, WAIT_RESP</td>\n                <td>전체 전송 요구량과 현재 주소의 Alignment 상태를 평가하여, 규격에 부합하는 ARLEN(Burst Length)/ARSIZE(Burst Size) 필드를 동적 생성합니다.</td>\n              </tr>\n              <tr>\n                <td><strong>Sync FIFO</strong></td>\n                <td>Room 카운터 / Item 카운터 추적</td>\n                <td>Read 및 Write 도메인을 독립적으로 Decoupling하여 트래픽 병목에 의한 파이프라인 스톨(Stall) 파급을 국소화합니다.</td>\n              </tr>\n              <tr>\n                <td><strong>Write Engine</strong></td>\n                <td>IDLE, UNALIGNED_ALIGN, ALIGNED_BURST, WAIT_RESP</td>\n                <td>버퍼로부터 유입된 Data 및 Strobe 마스크를 취합하여 Write Burst 사이클을 구동하며, 규정된 BVALID 응답까지 이력을 관리합니다.</td>\n              </tr>\n            </tbody>\n          </table>\n        </div>\n\n        <div class=\"mt-6 bg-[#f9fafb] border border-gray-200 rounded-2xl p-6\">\n          <h4 class=\"font-bold text-[#191f28] mb-3\">개념도: 내부 엔진 협업 흐름 (Cooperative Data Flow)</h4>\n          <div class=\"grid lg:grid-cols-[1fr_80px_1fr_80px_1fr] gap-3 items-stretch\">\n            <div class=\"bg-[#eff7ff] border border-blue-200 rounded-xl p-4\">\n              <p class=\"text-[13px] font-bold text-blue-900\">Read Engine</p>\n              <p class=\"text-[12px] text-blue-800 mt-2 leading-relaxed\">Source 어드레스를 기점으로 AR/R 트랜잭션을 전개합니다. 하드웨어적 Alignment 불규칙성이 감지될 경우 단발성 트랜잭션으로 주소를 보정한 후 대규모 Aligned Burst를 수행합니다.</p>\n            </div>\n            <div class=\"hidden lg:flex items-center justify-center text-[#8b95a1] font-black\">→</div>\n            <div class=\"bg-white border border-gray-200 rounded-xl p-4\">\n              <p class=\"text-[13px] font-bold text-[#191f28]\">Sync FIFO</p>\n              <p class=\"text-[12px] text-[#4e5968] mt-2 leading-relaxed\">물리적 지연 요소(Latency) 불균형을 극복하기 위해 Read 채널에서 병합된 Data 및 Byte Strobe 신호계를 일시적으로 큐잉(Queueing) 처리합니다.</p>\n            </div>\n            <div class=\"hidden lg:flex items-center justify-center text-[#8b95a1] font-black\">→</div>\n            <div class=\"bg-[#ecfdf5] border border-green-200 rounded-xl p-4\">\n              <p class=\"text-[13px] font-bold text-green-900\">Write Engine</p>\n              <p class=\"text-[12px] text-green-800 mt-2 leading-relaxed\">Destination 어드레스 기반으로 AW/W 채널을 전개합니다. Strobe 벡터를 해석하여 유효 바이트 범위만을 메모리에 커밋(Commit)하며 트랜잭션을 정상 종단합니다.</p>\n            </div>\n          </div>\n          <div class=\"mt-4 grid md:grid-cols-3 gap-3\">\n            <div class=\"bg-white border border-gray-200 rounded-xl p-4\">\n              <p class=\"text-[12px] font-bold text-[#191f28]\">Activation 조건</p>\n              <p class=\"text-[12px] text-[#4e5968] mt-1\">CSR 컨트롤러가 GO 비트를 수락함과 동시에 내부 파이프라인이 Source 및 Destination 베이스 어드레스를 페치하여 구동 상태로 진입합니다.</p>\n            </div>\n            <div class=\"bg-white border border-gray-200 rounded-xl p-4\">\n              <p class=\"text-[12px] font-bold text-[#191f28]\">Backpressure 제어</p>\n              <p class=\"text-[12px] text-[#4e5968] mt-1\">FIFO Full 상태 발생 시 Read 파이프라인의 Valid 인가가 중단되며, Empty 상태에서는 Write 파이프라인이 Stall하여 동적 균형을 유지합니다.</p>\n            </div>\n            <div class=\"bg-white border border-gray-200 rounded-xl p-4\">\n              <p class=\"text-[12px] font-bold text-[#191f28]\">Termination 조건</p>\n              <p class=\"text-[12px] text-[#4e5968] mt-1\">Read 측의 마지막 펄스와 Write 측의 최종 확인 응답(B Channel)이 모두 충족되었을 때 FSM 프로세스가 종결 지점으로 회귀합니다.</p>\n            </div>\n          </div>\n        </div>\n\n        <div class=\"mt-6 bg-[#eef8ff] border border-blue-200 rounded-2xl p-6\">\n          <h4 class=\"font-bold text-[#191f28] mb-3\">RTL 아키텍처 관점 주요 상태 방정식</h4>\n          <p class=\"text-[13px] text-[#4e5968] mb-4 leading-relaxed\">\n            세부 하드웨어 논리를 관통하는 코어 제어 로직의 불리언(Boolean) 상관 관계를 추상화할 경우 다음과 같은 주요 방정식으로 도출됩니다.\n          </p>\n          <div class=\"grid md:grid-cols-3 gap-3\">\n            <div class=\"bg-white border border-blue-100 rounded-xl p-4\">\n              <p class=\"text-[12px] font-bold text-blue-900\">Busy 인디케이터</p>\n              <p class=\"text-[12px] text-[#4e5968] mt-1\">`Read_Active || Write_Active` 시 논리적 Busy 상태가 유지됩니다.</p>\n            </div>\n            <div class=\"bg-white border border-blue-100 rounded-xl p-4\">\n              <p class=\"text-[12px] font-bold text-blue-900\">Done 트리거</p>\n              <p class=\"text-[12px] text-[#4e5968] mt-1\">`Read_Complete && Write_Complete` 조건의 교집합에서 최종 상태 논리가 성립됩니다.</p>\n            </div>\n            <div class=\"bg-white border border-blue-100 rounded-xl p-4\">\n              <p class=\"text-[12px] font-bold text-blue-900\">FIFO 임계 제어</p>\n              <p class=\"text-[12px] text-[#4e5968] mt-1\">Read는 `Room_Threshold > 0`일 때, Write는 `Item_Threshold > 0`일 때 동작이 인가됩니다.</p>\n            </div>\n          </div>\n          <div class=\"mt-4 grid md:grid-cols-2 gap-3 text-[12px] text-[#4e5968]\">\n            <div class=\"bg-white border border-blue-100 rounded-xl p-4\"><strong class=\"text-[#191f28]\">Read Interface:</strong> AR Handshake 성립 이후 버스 상의 유효 R-Beat 데이터를 버퍼 공간에 이적합니다.</div>\n            <div class=\"bg-white border border-blue-100 rounded-xl p-4\"><strong class=\"text-[#191f28]\">Write Interface:</strong> 버퍼 데이터 및 Byte Strobe를 디코딩하여 AW/W 트랜잭션으로 환산 및 메모리 반환 응답을 대기합니다.</div>\n          </div>\n        </div>\n      </div>\n\n      <div class=\"bg-white p-8 rounded-2xl border border-gray-200 shadow-sm mb-8\">\n        <div class=\"flex justify-between items-start mb-6\">\n          <div>\n            <h3 class=\"text-xl font-bold text-[#191f28]\">3.2 데이터 파이프라인 시각화 (AXI-Stream)</h3>\n            <p class=\"text-[14px] text-[#4e5968] mt-1\">메모리 맵핑 의존성을 배제하고 TLAST 메타데이터를 Packet Boundary 마커로 채택하여 스트리밍 무결성을 유지하는 구동 메커니즘입니다.</p>\n          </div>\n          <button onclick=\"runStreamAnimation()\" id=\"btn-stream\" class=\"bg-[#8b5cf6] hover:bg-purple-600 text-white px-5 py-2.5 rounded-xl font-bold text-sm flex items-center gap-2 transition-all active:scale-95 shadow-md\">\n            <i data-lucide=\"play\" class=\"w-4 h-4\"></i> Stream 데이터 송신\n          </button>\n        </div>\n\n        <div class=\"bg-[#f8f9fa] border border-[#e5e8eb] p-6 rounded-xl relative overflow-hidden h-[180px] flex items-center justify-between\">\n          <div class=\"w-28 h-28 bg-white border-[3px] border-[#3182f6] rounded-xl flex flex-col items-center justify-center z-10 shadow-sm\">\n            <span class=\"font-extrabold text-[#3182f6]\">DMA</span>\n            <span class=\"text-[10px] text-gray-500\">(Master)</span>\n          </div>\n          \n          <div class=\"flex-1 h-full relative flex items-center justify-center overflow-hidden\" id=\"stream-channel\">\n            <div class=\"w-full h-2 bg-[#dbeafe] rounded-full relative\"></div>\n          </div>\n\n          <div class=\"w-28 h-28 bg-white border-[3px] border-[#8b5cf6] rounded-xl flex flex-col items-center justify-center z-10 shadow-sm\">\n            <span class=\"font-extrabold text-[#8b5cf6]\">Target IP</span>\n            <span class=\"text-[10px] text-gray-500\">(Slave)</span>\n          </div>\n        </div>\n\n        <div class=\"mt-6 bg-[#f9fafb] border border-gray-200 rounded-2xl p-5\">\n          <h4 class=\"font-bold text-[#191f28] mb-3 flex items-center gap-2\">\n            <i data-lucide=\"network\" class=\"w-5 h-5 text-[#3182f6]\"></i>\n            Architecture of AXI-Stream: Source와 Sink 사이의 신호 방향\n          </h4>\n          <svg viewBox=\"0 0 900 420\" role=\"img\" aria-label=\"Architecture of AXI Stream source sink signals\" style=\"display:block;width:100%;height:auto;\">\n            <defs>\n              <marker id=\"axis-signal-arrow\" markerWidth=\"10\" markerHeight=\"8\" refX=\"9\" refY=\"4\" orient=\"auto\">\n                <path d=\"M0,0 L10,4 L0,8 Z\" fill=\"#2b3038\"></path>\n              </marker>\n              <marker id=\"axis-ready-arrow\" markerWidth=\"10\" markerHeight=\"8\" refX=\"1\" refY=\"4\" orient=\"auto\">\n                <path d=\"M10,0 L0,4 L10,8 Z\" fill=\"#2b3038\"></path>\n              </marker>\n            </defs>\n            <rect x=\"18\" y=\"24\" width=\"176\" height=\"280\" fill=\"#ffffff\" stroke=\"#2b3038\" stroke-width=\"2\"></rect>\n            <rect x=\"706\" y=\"24\" width=\"176\" height=\"280\" fill=\"#ffffff\" stroke=\"#2b3038\" stroke-width=\"2\"></rect>\n            <text x=\"106\" y=\"156\" text-anchor=\"middle\" fill=\"#191f28\" font-size=\"19\" font-weight=\"800\">Source</text>\n            <text x=\"106\" y=\"184\" text-anchor=\"middle\" fill=\"#191f28\" font-size=\"15\">(DMA, ADC, Video)</text>\n            <text x=\"794\" y=\"156\" text-anchor=\"middle\" fill=\"#191f28\" font-size=\"19\" font-weight=\"800\">Sink</text>\n            <text x=\"794\" y=\"184\" text-anchor=\"middle\" fill=\"#191f28\" font-size=\"15\">(FIFO, DSP, Display)</text>\n\n            <g stroke=\"#2b3038\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\">\n              <path d=\"M194 76 H692\" marker-end=\"url(#axis-signal-arrow)\"></path>\n              <path d=\"M692 104 H194\" marker-end=\"url(#axis-ready-arrow)\"></path>\n              <path d=\"M194 132 H692\" marker-end=\"url(#axis-signal-arrow)\"></path>\n              <path d=\"M194 160 H692\" marker-end=\"url(#axis-signal-arrow)\"></path>\n              <path d=\"M194 188 H692\" marker-end=\"url(#axis-signal-arrow)\"></path>\n              <path d=\"M194 216 H692\" marker-end=\"url(#axis-signal-arrow)\"></path>\n              <path d=\"M194 244 H692\" marker-end=\"url(#axis-signal-arrow)\"></path>\n              <path d=\"M194 272 H692\" marker-end=\"url(#axis-signal-arrow)\"></path>\n              <path d=\"M194 300 H692\" marker-end=\"url(#axis-signal-arrow)\"></path>\n            </g>\n            <g font-size=\"15\" font-weight=\"800\" text-anchor=\"middle\" fill=\"#191f28\">\n              <text x=\"450\" y=\"68\">TVALID</text>\n              <text x=\"450\" y=\"96\">TREADY</text>\n              <text x=\"450\" y=\"124\">TDATA</text>\n              <text x=\"450\" y=\"152\">TKEEP</text>\n              <text x=\"450\" y=\"180\">TSTRB</text>\n              <text x=\"450\" y=\"208\">TLAST</text>\n              <text x=\"450\" y=\"236\">TID</text>\n              <text x=\"450\" y=\"264\">TDEST</text>\n              <text x=\"450\" y=\"292\">TUSER</text>\n            </g>\n            <text x=\"450\" y=\"336\" text-anchor=\"middle\" fill=\"#191f28\" font-size=\"16\" font-weight=\"800\">TVALID와 TREADY가 맨 위에서 흐름을 결정하고, 그 아래 Payload/Sideband가 같은 beat에 따라갑니다.</text>\n            <text x=\"450\" y=\"360\" text-anchor=\"middle\" fill=\"#4e5968\" font-size=\"14\" font-weight=\"700\">주소 채널도, 별도 read/write response 채널도 없습니다. Stream은 “지금 이 beat를 받을 수 있는가?”만 묻습니다.</text>\n          </svg>\n          <div class=\"mt-4 grid md:grid-cols-3 gap-3\">\n            <div class=\"bg-white border border-gray-200 rounded-xl p-4\">\n              <i data-lucide=\"arrow-right\" class=\"w-5 h-5 text-[#3182f6] mb-3\"></i>\n              <p class=\"text-[12px] font-bold text-[#191f28]\">Source 방향</p>\n              <p class=\"text-[12px] text-[#4e5968] mt-1\">TVALID / TDATA / TKEEP / TLAST / TUSER</p>\n            </div>\n            <div class=\"bg-white border border-gray-200 rounded-xl p-4\">\n              <i data-lucide=\"arrow-left\" class=\"w-5 h-5 text-green-600 mb-3\"></i>\n              <p class=\"text-[12px] font-bold text-[#191f28]\">Sink 방향</p>\n              <p class=\"text-[12px] text-[#4e5968] mt-1\">TREADY / backpressure / 수신 가능 상태</p>\n            </div>\n            <div class=\"bg-white border border-gray-200 rounded-xl p-4\">\n              <i data-lucide=\"settings\" class=\"w-5 h-5 text-[#8b5cf6] mb-3\"></i>\n              <p class=\"text-[12px] font-bold text-[#191f28]\">DMA 역할 전환</p>\n              <p class=\"text-[12px] text-[#4e5968] mt-1\">MM2S Source / S2MM Sink / 동일 handshake</p>\n            </div>\n          </div>\n        </div>\n\n        <div class=\"mt-6 grid lg:grid-cols-2 gap-5\">\n          <div class=\"bg-[#f9fafb] border border-gray-200 rounded-2xl p-5\">\n            <h4 class=\"font-bold text-[#191f28] mb-3\">Packet Anatomy: 한 beat에 같이 움직이는 것</h4>\n            <svg viewBox=\"0 0 720 250\" role=\"img\" aria-label=\"AXI-Stream packet anatomy\" style=\"display:block;width:100%;height:auto;\">\n              <rect x=\"18\" y=\"18\" width=\"684\" height=\"214\" rx=\"18\" fill=\"#ffffff\" stroke=\"#e5e8eb\"></rect>\n              <g font-size=\"13\" font-weight=\"800\" text-anchor=\"middle\">\n                <rect x=\"58\" y=\"74\" width=\"118\" height=\"64\" rx=\"12\" fill=\"#eff7ff\" stroke=\"#bfdbfe\"></rect>\n                <text x=\"117\" y=\"103\" fill=\"#1d4ed8\">Beat 0</text>\n                <text x=\"117\" y=\"123\" fill=\"#4e5968\" font-size=\"11\">TDATA</text>\n                <rect x=\"196\" y=\"74\" width=\"118\" height=\"64\" rx=\"12\" fill=\"#eff7ff\" stroke=\"#bfdbfe\"></rect>\n                <text x=\"255\" y=\"103\" fill=\"#1d4ed8\">Beat 1</text>\n                <text x=\"255\" y=\"123\" fill=\"#4e5968\" font-size=\"11\">TDATA</text>\n                <rect x=\"334\" y=\"74\" width=\"118\" height=\"64\" rx=\"12\" fill=\"#eff7ff\" stroke=\"#bfdbfe\"></rect>\n                <text x=\"393\" y=\"103\" fill=\"#1d4ed8\">Beat 2</text>\n                <text x=\"393\" y=\"123\" fill=\"#4e5968\" font-size=\"11\">TDATA</text>\n                <rect x=\"472\" y=\"74\" width=\"118\" height=\"64\" rx=\"12\" fill=\"#fff1f2\" stroke=\"#fecaca\"></rect>\n                <text x=\"531\" y=\"99\" fill=\"#dc2626\">Last Beat</text>\n                <text x=\"531\" y=\"119\" fill=\"#dc2626\" font-size=\"11\">TDATA + TLAST</text>\n              </g>\n              <g stroke=\"#8b95a1\" stroke-width=\"2\" fill=\"none\">\n                <path d=\"M176 106 H196\"></path>\n                <path d=\"M314 106 H334\"></path>\n                <path d=\"M452 106 H472\"></path>\n              </g>\n              <g font-size=\"12\" font-weight=\"800\" text-anchor=\"middle\">\n                <rect x=\"82\" y=\"158\" width=\"92\" height=\"28\" rx=\"14\" fill=\"#f3e8ff\" stroke=\"#d8b4fe\"></rect>\n                <text x=\"128\" y=\"177\" fill=\"#7c3aed\">TKEEP</text>\n                <rect x=\"190\" y=\"158\" width=\"92\" height=\"28\" rx=\"14\" fill=\"#ecfdf5\" stroke=\"#bbf7d0\"></rect>\n                <text x=\"236\" y=\"177\" fill=\"#15803d\">TREADY</text>\n                <rect x=\"298\" y=\"158\" width=\"92\" height=\"28\" rx=\"14\" fill=\"#eff7ff\" stroke=\"#bfdbfe\"></rect>\n                <text x=\"344\" y=\"177\" fill=\"#1d4ed8\">TVALID</text>\n                <rect x=\"406\" y=\"158\" width=\"92\" height=\"28\" rx=\"14\" fill=\"#fff7ed\" stroke=\"#fed7aa\"></rect>\n                <text x=\"452\" y=\"177\" fill=\"#c2410c\">TUSER</text>\n                <rect x=\"514\" y=\"158\" width=\"92\" height=\"28\" rx=\"14\" fill=\"#fff1f2\" stroke=\"#fecaca\"></rect>\n                <text x=\"560\" y=\"177\" fill=\"#dc2626\">TLAST</text>\n              </g>\n              <text x=\"360\" y=\"212\" fill=\"#4e5968\" font-size=\"12\" font-weight=\"700\" text-anchor=\"middle\">AXI-Stream은 주소 대신 beat 순서와 sideband 신호로 패킷 의미를 보존합니다.</text>\n            </svg>\n          </div>\n\n          <div class=\"bg-[#f9fafb] border border-gray-200 rounded-2xl p-5\">\n            <h4 class=\"font-bold text-[#191f28] mb-3\">Backpressure 타이밍: 멈춰도 데이터는 유지</h4>\n            <svg viewBox=\"0 0 720 250\" role=\"img\" aria-label=\"AXI-Stream backpressure timing\" style=\"display:block;width:100%;height:auto;\">\n              <rect x=\"18\" y=\"18\" width=\"684\" height=\"214\" rx=\"18\" fill=\"#ffffff\" stroke=\"#e5e8eb\"></rect>\n              <g stroke=\"#d1d5db\" stroke-width=\"1\">\n                <line x1=\"150\" y1=\"48\" x2=\"150\" y2=\"206\"></line>\n                <line x1=\"240\" y1=\"48\" x2=\"240\" y2=\"206\"></line>\n                <line x1=\"330\" y1=\"48\" x2=\"330\" y2=\"206\"></line>\n                <line x1=\"420\" y1=\"48\" x2=\"420\" y2=\"206\"></line>\n                <line x1=\"510\" y1=\"48\" x2=\"510\" y2=\"206\"></line>\n                <line x1=\"600\" y1=\"48\" x2=\"600\" y2=\"206\"></line>\n              </g>\n              <g font-size=\"13\" font-weight=\"800\">\n                <text x=\"44\" y=\"78\" fill=\"#191f28\">TVALID</text>\n                <text x=\"44\" y=\"126\" fill=\"#191f28\">TREADY</text>\n                <text x=\"44\" y=\"174\" fill=\"#191f28\">TDATA</text>\n              </g>\n              <g stroke=\"#191f28\" stroke-width=\"3\" fill=\"none\" stroke-linejoin=\"round\">\n                <polyline points=\"130,84 150,84 150,62 600,62 600,84\"></polyline>\n                <polyline points=\"130,132 150,132 150,110 300,110 300,132 420,132 420,110 600,110 600,132\"></polyline>\n              </g>\n              <g font-size=\"13\" font-weight=\"800\" text-anchor=\"middle\">\n                <rect x=\"154\" y=\"154\" width=\"138\" height=\"34\" rx=\"8\" fill=\"#eff7ff\" stroke=\"#bfdbfe\"></rect>\n                <text x=\"223\" y=\"176\" fill=\"#1d4ed8\">D0 accepted</text>\n                <rect x=\"302\" y=\"154\" width=\"106\" height=\"34\" rx=\"8\" fill=\"#fff7ed\" stroke=\"#fed7aa\"></rect>\n                <text x=\"355\" y=\"176\" fill=\"#c2410c\">D1 hold</text>\n                <rect x=\"424\" y=\"154\" width=\"138\" height=\"34\" rx=\"8\" fill=\"#eff7ff\" stroke=\"#bfdbfe\"></rect>\n                <text x=\"493\" y=\"176\" fill=\"#1d4ed8\">D1 accepted</text>\n              </g>\n              <text x=\"360\" y=\"214\" fill=\"#4e5968\" font-size=\"12\" font-weight=\"700\" text-anchor=\"middle\">TREADY가 0인 동안 Master는 TDATA/TLAST/TKEEP 값을 바꾸면 안 됩니다.</text>\n            </svg>\n          </div>\n        </div>\n\n        <h3 class=\"text-lg font-bold mt-10 mb-3 text-[#191f28]\">3.3 AXI-Stream 핵심 신호선</h3>\n        <div class=\"overflow-x-auto\">\n          <table class=\"data-table\">\n            <thead>\n              <tr>\n                <th class=\"w-32\">Signal</th>\n                <th class=\"w-20\">Source</th>\n                <th>Engineering Description</th>\n              </tr>\n            </thead>\n            <tbody>\n              <tr>\n                <td class=\"font-bold text-[#3182f6]\">TDATA</td>\n                <td>Master</td>\n                <td>실제 페이로드(Payload) 데이터.</td>\n              </tr>\n              <tr>\n                <td class=\"font-bold text-[#4e5968]\">TVALID</td>\n                <td>Master</td>\n                <td>현재 사이클의 TDATA/TKEEP/TLAST/TUSER가 유효함을 표시합니다. 데이터는 TVALID와 TREADY가 동시에 High인 클럭 엣지에서만 이동합니다.</td>\n              </tr>\n              <tr>\n                <td class=\"font-bold text-green-600\">TREADY</td>\n                <td>Slave</td>\n                <td>수신측이 데이터를 받을 준비가 되었음을 표시합니다. TREADY가 0이면 송신측은 같은 데이터를 유지해야 하며, 이것이 AXI-Stream의 Backpressure입니다.</td>\n              </tr>\n              <tr>\n                <td class=\"font-bold text-red-500\">TLAST</td>\n                <td>Master</td>\n                <td><strong>논리 패킷의 종단</strong>을 지시하는 신호입니다. 송신 모듈(Tx)은 논리 단위(예: 영상의 1 라인, 블록 단위 연산 결과)의 마지막 버스 사이클에 맞추어 TLAST 펄스를 인가하며, DMA 하드웨어는 이를 감지해 데이터 수납 스코프 한 단위를 조기 종결시키고 레지스터 상태를 반영합니다.</td>\n              </tr>\n              <tr>\n                <td class=\"font-bold text-purple-600\">TKEEP / TSTRB</td>\n                <td>Master</td>\n                <td>마지막 beat처럼 버스 폭보다 실제 유효 바이트가 적을 때 어떤 byte lane이 유효한지 표시합니다. 패킷 길이가 데이터 폭의 배수가 아닐 때 특히 중요합니다.</td>\n              </tr>\n              <tr>\n                <td class=\"font-bold text-orange-600\">TUSER</td>\n                <td>Master</td>\n                <td>프로토콜 외 부가 의미를 전달하는 sideband입니다. AXI4-Stream Video에서는 일반적으로 프레임 시작(SOF)을 나타내는 데 사용됩니다.</td>\n              </tr>\n            </tbody>\n          </table>\n        </div>\n      </div>\n\n      <div class=\"grid lg:grid-cols-[1fr_1fr] gap-6\">\n        <div class=\"bg-white p-8 rounded-2xl border border-gray-200 shadow-sm\">\n          <h3 class=\"text-xl font-bold text-[#191f28] mb-4 flex items-center gap-2\">\n            <i data-lucide=\"pause-circle\" class=\"w-5 h-5 text-amber-500\"></i>\n            3.4 Backpressure와 Deadlock 조건\n          </h3>\n          <p class=\"text-[14px] text-[#4e5968] leading-relaxed mb-5\">\n            AXI-Stream은 주소가 없기 때문에, 정상 동작 여부는 거의 전부 <strong>TVALID/TREADY/TLAST</strong> 조합에서 결정됩니다.\n            타겟 IP가 계산 중이라 TREADY를 내리면 DMA의 MM2S 출력도 멈추고, S2MM 쪽 버퍼가 꽉 차면 앞단 전체에 정지가 전파됩니다.\n          </p>\n          <div class=\"space-y-3\">\n            <div class=\"bg-[#fff7ed] border border-orange-200 rounded-xl p-4\">\n              <p class=\"text-[13px] font-bold text-orange-900\">TREADY=0은 에러가 아니라 흐름 제어입니다.</p>\n              <p class=\"text-[12px] text-orange-800 mt-1\">다만 설계가 이 정지 상태를 견디지 못하고 데이터를 바꾸거나 TLAST를 잃으면 바로 프로토콜 위반입니다.</p>\n            </div>\n            <div class=\"bg-[#fff1f2] border border-red-200 rounded-xl p-4\">\n              <p class=\"text-[13px] font-bold text-red-900\">TLAST 누락은 S2MM 완료 불가로 이어집니다.</p>\n              <p class=\"text-[12px] text-red-800 mt-1\">수신 DMA는 지정 길이 또는 패킷 종료 조건을 기다리므로, TLAST가 오지 않으면 인터럽트가 발생하지 않는 Hang처럼 보일 수 있습니다.</p>\n            </div>\n            <div class=\"bg-[#eff7ff] border border-blue-200 rounded-xl p-4\">\n              <p class=\"text-[13px] font-bold text-blue-900\">FIFO/Skid Buffer는 선택이 아니라 안전장치입니다.</p>\n              <p class=\"text-[12px] text-blue-800 mt-1\">연산 IP의 latency와 DDR burst 응답 변동을 흡수해, 양쪽의 순간적인 준비 상태 차이가 전체 deadlock으로 번지는 것을 줄입니다.</p>\n            </div>\n          </div>\n        </div>\n\n        <div class=\"bg-white p-8 rounded-2xl border border-gray-200 shadow-sm\">\n          <h3 class=\"text-xl font-bold text-[#191f28] mb-4 flex items-center gap-2\">\n            <i data-lucide=\"film\" class=\"w-5 h-5 text-[#8b5cf6]\"></i>\n            3.5 AXI4-Stream Video와 VDMA 관점\n          </h3>\n          <p class=\"text-[14px] text-[#4e5968] leading-relaxed mb-5\">\n            영상 스트림은 단순 byte stream보다 구조가 엄격합니다. 한 프레임은 여러 라인으로 구성되고, 각 라인 길이와 메모리 stride가 맞아야 하므로 일반 AXI DMA보다 <strong>AXI VDMA</strong>가 자연스러운 경우가 많습니다.\n          </p>\n          <div class=\"overflow-x-auto\">\n            <table class=\"data-table\">\n              <thead>\n                <tr>\n                  <th>Video 개념</th>\n                  <th>AXI4-Stream 표현</th>\n                  <th>VDMA 설정과의 관계</th>\n                </tr>\n              </thead>\n              <tbody>\n                <tr>\n                  <td><strong>SOF</strong></td>\n                  <td>TUSER</td>\n                  <td>새 프레임의 첫 픽셀/첫 beat를 표시합니다.</td>\n                </tr>\n                <tr>\n                  <td><strong>EOL</strong></td>\n                  <td>TLAST</td>\n                  <td>보통 한 라인의 마지막 beat를 의미합니다.</td>\n                </tr>\n                <tr>\n                  <td><strong>HSIZE / VSIZE</strong></td>\n                  <td>라인 바이트 수 / 라인 개수</td>\n                  <td>프레임의 2D 크기를 지정합니다.</td>\n                </tr>\n                <tr>\n                  <td><strong>Stride</strong></td>\n                  <td>메모리 내 다음 라인 시작 간격</td>\n                  <td>패딩이 있는 frame buffer에서 HSIZE보다 클 수 있습니다.</td>\n                </tr>\n              </tbody>\n            </table>\n          </div>\n          <div class=\"mt-4 bg-[#f4f0ff] border border-purple-200 rounded-xl p-4 text-[13px] text-purple-900 leading-relaxed\">\n            <strong>판단 기준:</strong> 데이터가 “패킷 몇 개” 수준이면 AXI DMA로 충분할 수 있습니다. 하지만 프레임 동기화, 라인 stride, genlock, display/capture 경로가 등장하면 VDMA로 보는 것이 안전합니다.\n          </div>\n        </div>\n      </div>"}, "sg": {"id": "sg", "html": "<div class=\"space-y-4 border-b border-gray-200 pb-6\">\n      <span class=\"text-[#3182f6] font-bold text-sm tracking-wide\">Chapter 4. Advanced Execution Architecture</span>\n      <h2 class=\"text-3xl font-extrabold text-[#191f28]\">Scatter-Gather와 Linked List Descriptor 아키텍처</h2>\n      <p class=\"text-[#4e5968] text-lg\">단편화된 물리 메모리 공간을 CPU의 Buffer Descriptor (BD) 조립 과정을 통해 단일 연속 트랜잭션으로 가상화하여 전송하는 병렬적 구조를 다룹니다.</p>\n    </div>\n\n    <div class=\"bg-[#fff7ed] p-8 rounded-2xl border border-orange-200 shadow-sm relative overflow-hidden\">\n      <div class=\"absolute -right-10 -top-10 w-40 h-40 bg-orange-50 rounded-full blur-3xl -z-10\"></div>\n      <h3 class=\"text-xl font-bold text-orange-600 mb-4 flex items-center gap-2\">\n        <i data-lucide=\"help-circle\" class=\"w-6 h-6 text-orange-500\"></i>\n        4.1 핵심 오개념 불식: BD(Buffer Descriptor)의 생성 주체\n      </h3>\n      <p class=\"text-[15px] text-gray-700 leading-relaxed mb-4\">\n        가장 빈번한 오해 중 하나는 메모리 상의 BD가 사전 정의된 상수이거나 하드웨어가 스스로 구축한다는 가정입니다.\n      </p>\n      <p class=\"text-[15px] text-gray-700 leading-relaxed mb-6\">\n        현실의 구현에서는 DMA 하드웨어 기동 <strong>직전 단계</strong>에서, <strong>운영체제(OS) 최하단의 Device Driver가 시스템 동적 RAM 스페이스를 할당받아 인위적으로 BD 체인을 레코딩</strong>합니다.\n        즉, CPU가 주동자가 되어 물리 주소의 맵핑 포인터와 설정값들을 일일이 기입하여 Linked List를 완성한 뒤, 그 Entry Point (CURDESC)만 DMA 하드웨어에게 인가하는 방식입니다.\n      </p>\n\n      <div class=\"sg-code-panel\">\n        <div class=\"sg-code-header\">\n          <span class=\"sg-code-prompt\">&gt;_</span>\n          <span>CPU Device Driver - Pseudo C Flow</span>\n        </div>\n        <div>\n          <div class=\"sg-code-section\">\n            <p class=\"sg-code-comment\">// 1. Descriptor 메모리 확보: CPU가 DMA와 공유 가능한 RAM 영역을 확보</p>\n            <p><span class=\"sg-code-symbol\">BD* bd0</span><span class=\"sg-code-text\"> = dma_alloc_coherent(sizeof(BD), &amp;bd0_dma);</span><span class=\"sg-code-inline-comment\">// CPU virtual pointer + DMA bus address</span></p>\n            <p><span class=\"sg-code-symbol\">BD* bd1</span><span class=\"sg-code-text\"> = dma_alloc_coherent(sizeof(BD), &amp;bd1_dma);</span></p>\n          </div>\n          <div class=\"sg-code-section\">\n            <p class=\"sg-code-comment\">// 2. CPU가 descriptor field 작성: DMA가 이해하는 주소는 dma_addr_t</p>\n            <p><span class=\"sg-code-symbol\">bd0-&gt;NXTDESC</span><span class=\"sg-code-text\"> = bd1_dma;</span><span class=\"sg-code-inline-comment\">// 다음 descriptor의 DMA 주소</span></p>\n            <p><span class=\"sg-code-symbol\">bd0-&gt;BUF_ADDR</span><span class=\"sg-code-text\"> = block_A_dma;</span><span class=\"sg-code-inline-comment\">// 실제 데이터 버퍼의 DMA 주소</span></p>\n            <p><span class=\"sg-code-symbol\">bd0-&gt;LENGTH</span><span class=\"sg-code-text\"> = 4096;</span></p>\n            <p><span class=\"sg-code-symbol\">bd0-&gt;CONTROL</span><span class=\"sg-code-text\"> = SOF;</span><span class=\"sg-code-inline-comment\">// 패킷 시작 지시</span></p>\n            <p class=\"mt-3\"><span class=\"sg-code-symbol\">bd1-&gt;NXTDESC</span><span class=\"sg-code-text\"> = tail_dma;</span><span class=\"sg-code-inline-comment\">// 여기까지 처리하면 종료</span></p>\n            <p><span class=\"sg-code-symbol\">bd1-&gt;BUF_ADDR</span><span class=\"sg-code-text\"> = block_B_dma;</span></p>\n            <p><span class=\"sg-code-symbol\">bd1-&gt;LENGTH</span><span class=\"sg-code-text\"> = 2048;</span></p>\n            <p><span class=\"sg-code-symbol\">bd1-&gt;CONTROL</span><span class=\"sg-code-text\"> = EOF;</span><span class=\"sg-code-inline-comment\">// 패킷 마지막 지시</span></p>\n          </div>\n          <div class=\"sg-code-section\">\n            <p class=\"sg-code-comment\">// 3. AXI-Lite로 DMA에게 시작 위치와 끝 위치를 통보</p>\n            <p><span class=\"sg-code-blue\">DMA_REG-&gt;CURDESC</span><span class=\"sg-code-text\"> = bd0_dma;</span><span class=\"sg-code-inline-comment\">// DMA가 처음 읽을 descriptor 주소</span></p>\n            <p><span class=\"sg-code-red\">DMA_REG-&gt;TAILDESC</span><span class=\"sg-code-text\"> = tail_dma;</span><span class=\"sg-code-red sg-code-inline-comment\">// 마지막 주소를 쓰는 순간 DMA 시작</span></p>\n          </div>\n        </div>\n      </div>\n      <div class=\"mt-5 grid md:grid-cols-2 gap-4\">\n        <div class=\"bg-white border border-orange-200 rounded-xl p-4\">\n          <p class=\"text-[13px] font-bold text-orange-900\">CPU pointer와 DMA address를 구분해야 합니다.</p>\n          <p class=\"text-[12px] text-orange-800 mt-1 leading-relaxed\">\n            CPU가 descriptor를 쓰기 위해 사용하는 포인터와 DMA 하드웨어가 AXI 버스에 내보내는 주소는 다를 수 있습니다. Linux 드라이버에서는 보통 <strong>CPU virtual address</strong>와 <strong>dma_addr_t</strong>를 함께 관리합니다.\n          </p>\n        </div>\n        <div class=\"bg-white border border-orange-200 rounded-xl p-4\">\n          <p class=\"text-[13px] font-bold text-orange-900\">Descriptor도 캐시 동기화 대상입니다.</p>\n          <p class=\"text-[12px] text-orange-800 mt-1 leading-relaxed\">\n            coherent 메모리가 아니면 BD field를 작성한 뒤 DMA가 보기 전에 clean/flush가 필요하고, DMA가 status를 업데이트한 뒤 CPU가 읽기 전 invalidate가 필요합니다.\n          </p>\n        </div>\n      </div>\n    </div>\n\n    <div class=\"bg-white p-8 rounded-2xl border border-[#3182f6] shadow-sm relative overflow-hidden\">\n      <div class=\"absolute -right-10 -top-10 w-40 h-40 bg-blue-50 rounded-full blur-3xl -z-10\"></div>\n      <h3 class=\"text-xl font-bold text-[#191f28] mb-4 flex items-center gap-2\">\n        <i data-lucide=\"help-circle\" class=\"w-6 h-6 text-[#3182f6]\"></i>\n        4.2 CPU와 DMA의 비동기적 협업 모델 단계\n      </h3>\n      <p class=\"text-[15px] text-[#4e5968] mb-6 leading-relaxed\">\n        현대적인 가상 메모리(MMU) 환경에서는 대용량 논리 버퍼가 단편화된 물리 페이지 스페이스로 분산 파편화될 확률이 높습니다. SG-DMA는 이러한 조각들을 Descriptor Chain으로 체계화하고,\n        DMA 트랜잭션이 해당 리스트를 순차 지향하여 실제 페이로드 세그먼트들을 순서대로 일괄 병합 전송합니다.\n      </p>\n\n      <div class=\"grid md:grid-cols-3 gap-4 relative z-10 mt-6\">\n        <div class=\"bg-[#f9fafb] p-5 rounded-xl border border-gray-200 shadow-sm flex flex-col\">\n            <span class=\"bg-gray-800 text-white text-[10px] font-bold px-2 py-1 rounded self-start\">Phase 1. Software (Kernel)</span>\n            <h4 class=\"font-bold text-[#191f28] mt-3 mb-2 text-[14px]\">BD Chain Allocation</h4>\n            <p class=\"text-[12.5px] text-gray-600 leading-relaxed\">\n                운영체제 드라이버는 동적 할당된 RAM 영역에 개별 BD 노드를 인스턴스화하고, 포인터(NXTDESC)로 각 노드를 연결하여 Ring 또는 Linear 형태의 커스텀 리스트를 구축합니다.\n            </p>\n        </div>\n        <div class=\"bg-[#f3e8ff] p-5 rounded-xl border border-purple-200 shadow-sm flex flex-col\">\n            <span class=\"bg-purple-600 text-white text-[10px] font-bold px-2 py-1 rounded self-start\">Phase 2. AXI-Lite API</span>\n            <h4 class=\"font-bold text-purple-900 mt-3 mb-2 text-[14px]\">SG Engine Trigger</h4>\n            <p class=\"text-[12.5px] text-purple-800 leading-relaxed\">\n                제어 인터페이스(AXI-Lite)를 거쳐 SG DMA 내부의 Current Descriptor 레지스터와 Tail Descriptor 레지스터에 각각 시작 노드와 타겟 노드의 주소를 Push하면 즉각적인 하드웨어 패치가 개시됩니다.\n            </p>\n        </div>\n        <div class=\"bg-[#eff7ff] p-5 rounded-xl border border-blue-200 shadow-sm flex flex-col\">\n            <span class=\"bg-blue-600 text-white text-[10px] font-bold px-2 py-1 rounded self-start\">Phase 3. AXI4 / AXI-Stream</span>\n            <h4 class=\"font-bold text-blue-900 mt-3 mb-2 text-[14px]\">Autonomous Execution</h4>\n            <p class=\"text-[12.5px] text-blue-800 leading-relaxed\">\n                SG DMA는 자체적인 AXI4 Master 모듈을 활성화하여 BD를 로컬 SRAM에 Fetch-Decode한 후 데이터 청크를 복사하며, 처리가 완료된 BD에 대해서는 Status 필드를 Update합니다.\n            </p>\n        </div>\n      </div>\n    </div>\n\n    <div class=\"bg-white p-8 rounded-2xl border border-gray-200 shadow-sm\">\n      <div class=\"flex items-start justify-between gap-4 mb-6\">\n        <div>\n          <h3 class=\"text-xl font-bold text-[#191f28]\">4.3 Buffer Descriptor 필드 맵</h3>\n          <p class=\"text-[14px] text-[#4e5968] mt-2 leading-relaxed\">\n            BD는 “코드 파일”이 아니라 CPU가 RAM에 써 놓는 작은 작업 카드입니다. DMA는 이 카드를 AXI4로 읽고, 실제 데이터 버퍼를 찾아가며, 마지막에 상태 칸을 다시 써 줍니다.\n          </p>\n        </div>\n        <span class=\"shrink-0 text-[11px] font-bold text-[#3182f6] bg-[#eff7ff] border border-blue-200 rounded-full px-3 py-1\">Descriptor as Data</span>\n      </div>\n\n      <div class=\"wide-visual\">\n        <svg class=\"wide-visual-canvas\" viewBox=\"0 0 960 420\" role=\"img\" aria-label=\"Scatter gather buffer descriptor field map\" style=\"display:block;margin:0 auto;\">\n          <rect x=\"18\" y=\"18\" width=\"924\" height=\"384\" rx=\"20\" fill=\"#f8f9fa\" stroke=\"#e5e8eb\"></rect>\n          <text x=\"480\" y=\"54\" text-anchor=\"middle\" fill=\"#191f28\" font-size=\"22\" font-weight=\"900\">Buffer Descriptor Anatomy</text>\n          <text x=\"480\" y=\"80\" text-anchor=\"middle\" fill=\"#4e5968\" font-size=\"13\" font-weight=\"700\">CPU writes control fields → DMA fetches and transfers → DMA writes status fields</text>\n\n          <g font-size=\"13\" font-weight=\"800\">\n            <rect x=\"70\" y=\"118\" width=\"190\" height=\"74\" rx=\"14\" fill=\"#f3e8ff\" stroke=\"#d8b4fe\"></rect>\n            <text x=\"92\" y=\"146\" fill=\"#7c3aed\">NXTDESC</text>\n            <text x=\"92\" y=\"169\" fill=\"#4e5968\" font-size=\"12\">다음 작업 카드 위치</text>\n            <rect x=\"278\" y=\"118\" width=\"190\" height=\"74\" rx=\"14\" fill=\"#eff7ff\" stroke=\"#bfdbfe\"></rect>\n            <text x=\"300\" y=\"146\" fill=\"#1d4ed8\">BUF_ADDR</text>\n            <text x=\"300\" y=\"169\" fill=\"#4e5968\" font-size=\"12\">실제 데이터 버퍼 위치</text>\n            <rect x=\"486\" y=\"118\" width=\"190\" height=\"74\" rx=\"14\" fill=\"#ecfdf5\" stroke=\"#bbf7d0\"></rect>\n            <text x=\"508\" y=\"146\" fill=\"#15803d\">LENGTH / CONTROL</text>\n            <text x=\"508\" y=\"169\" fill=\"#4e5968\" font-size=\"12\">전송 길이, SOF/EOF</text>\n            <rect x=\"694\" y=\"118\" width=\"190\" height=\"74\" rx=\"14\" fill=\"#fff7ed\" stroke=\"#fed7aa\"></rect>\n            <text x=\"716\" y=\"146\" fill=\"#c2410c\">STATUS</text>\n            <text x=\"716\" y=\"169\" fill=\"#4e5968\" font-size=\"12\">완료, 에러, 실제 전송량</text>\n          </g>\n\n          <g stroke=\"#8b95a1\" stroke-width=\"2\" fill=\"none\">\n            <path d=\"M260 155 H278\"></path>\n            <path d=\"M468 155 H486\"></path>\n            <path d=\"M676 155 H694\"></path>\n          </g>\n\n          <g font-size=\"12\" font-weight=\"800\" text-anchor=\"middle\">\n            <rect x=\"92\" y=\"228\" width=\"254\" height=\"62\" rx=\"14\" fill=\"#ffffff\" stroke=\"#d8b4fe\"></rect>\n            <text x=\"219\" y=\"253\" fill=\"#7c3aed\">CPU ownership</text>\n            <text x=\"219\" y=\"273\" fill=\"#4e5968\">descriptor 작성, cache clean, CURDESC/TAILDESC trigger</text>\n            <rect x=\"354\" y=\"228\" width=\"254\" height=\"62\" rx=\"14\" fill=\"#ffffff\" stroke=\"#bfdbfe\"></rect>\n            <text x=\"481\" y=\"253\" fill=\"#1d4ed8\">DMA ownership</text>\n            <text x=\"481\" y=\"273\" fill=\"#4e5968\">descriptor fetch, buffer read/write, next descriptor follow</text>\n            <rect x=\"616\" y=\"228\" width=\"254\" height=\"62\" rx=\"14\" fill=\"#ffffff\" stroke=\"#fed7aa\"></rect>\n            <text x=\"743\" y=\"253\" fill=\"#c2410c\">CPU reads back</text>\n            <text x=\"743\" y=\"273\" fill=\"#4e5968\">status invalidate 후 완료/에러/잔량 확인</text>\n          </g>\n\n          <g stroke=\"#4e5968\" stroke-width=\"2.4\" fill=\"none\" stroke-linecap=\"round\">\n            <path d=\"M219 222 C250 206 298 202 354 228\"></path>\n            <path d=\"M608 260 H616\"></path>\n            <path d=\"M482 290 C512 332 690 334 742 292\"></path>\n          </g>\n\n          <g font-size=\"12\" font-weight=\"800\">\n            <rect x=\"102\" y=\"328\" width=\"174\" height=\"40\" rx=\"20\" fill=\"#191f28\"></rect>\n            <text x=\"189\" y=\"353\" fill=\"#ffffff\" text-anchor=\"middle\">1. CPU writes BD</text>\n            <rect x=\"300\" y=\"328\" width=\"174\" height=\"40\" rx=\"20\" fill=\"#3182f6\"></rect>\n            <text x=\"387\" y=\"353\" fill=\"#ffffff\" text-anchor=\"middle\">2. DMA fetches</text>\n            <rect x=\"498\" y=\"328\" width=\"174\" height=\"40\" rx=\"20\" fill=\"#22c55e\"></rect>\n            <text x=\"585\" y=\"353\" fill=\"#ffffff\" text-anchor=\"middle\">3. Transfer data</text>\n            <rect x=\"696\" y=\"328\" width=\"174\" height=\"40\" rx=\"20\" fill=\"#f97316\"></rect>\n            <text x=\"783\" y=\"353\" fill=\"#ffffff\" text-anchor=\"middle\">4. Status update</text>\n          </g>\n        </svg>\n      </div>\n    </div>\n\n    <!-- 4.3 SG Animation -->\n    <div class=\"bg-white p-8 rounded-2xl border border-gray-200 shadow-sm overflow-hidden\">\n      <div class=\"flex justify-between items-start mb-6\">\n        <div>\n          <h3 class=\"text-xl font-bold text-[#191f28]\">4.4 동적 Scatter-Gather 메모리 매핑 시뮬레이션</h3>\n          <p class=\"text-[13px] text-[#4e5968] mt-2 max-w-2xl\">\n            왼측의 <strong>BD Linked List</strong> 구조와 우측의 분산된 <strong>물리 데이터 청크(Memory Segment)</strong> 간의 논리적 참조 트리에 주목하십시오.<br>\n            엔진의 BD Fetch 제어권 이동 &rarr; 버퍼링 대상 데이터 Payload 전송 &rarr; 상태 업데이트 (Status Commit) 주기입니다.\n          </p>\n        </div>\n        <button id=\"runSgBtn\" onclick=\"runSGAnimation()\" class=\"bg-[#3182f6] hover:bg-blue-600 text-white px-5 py-2.5 rounded-xl font-bold text-sm flex items-center gap-2 transition-all active:scale-95 whitespace-nowrap shadow-md mt-2\">\n            <i data-lucide=\"play\" class=\"w-4 h-4\"></i> SG Chain 실행\n        </button>\n      </div>\n\n      <div class=\"flex flex-col lg:flex-row gap-6\">\n        <!-- LEFT: BD Linked List in Memory -->\n        <div class=\"flex-1 bg-[#f8f9fa] border border-[#e5e8eb] p-6 rounded-xl relative\">\n          <h4 class=\"text-xs font-bold text-gray-500 mb-6 tracking-wide text-center bg-gray-200 py-1 rounded\">Memory: Buffer Descriptor Ring</h4>\n          \n          <!-- DMA Engine Pointer -->\n          <div id=\"dmaEnginePointer\" class=\"absolute left-[-20px] top-[40px] flex items-center gap-3 transition-all duration-700 ease-in-out opacity-0 z-20\">\n             <div class=\"w-8 h-8 bg-white border-[3px] border-[#3182f6] rounded-full flex items-center justify-center shadow-[0_0_15px_rgba(49,130,246,0.5)] relative\">\n               <i data-lucide=\"cpu\" class=\"w-4 h-4 text-[#3182f6]\" id=\"dmaIcon\"></i>\n               <span class=\"absolute -top-6 bg-white px-1.5 rounded text-[9px] font-bold text-[#3182f6] shadow border border-blue-200 whitespace-nowrap\">DMA Core</span>\n             </div>\n          </div>\n\n          <div class=\"flex flex-col gap-6 relative ml-12\">\n            <!-- BD 0 -->\n            <div id=\"bd-0\" class=\"bd-card bg-white shadow-sm rounded-lg overflow-hidden\">\n              <div class=\"bg-blue-50 text-blue-800 text-xs font-bold px-3 py-2 flex justify-between items-center border-b border-blue-100\">\n                <span>BD 0 (@0x1000)</span>\n                <span id=\"bd-0-tag\" class=\"text-[9px] bg-[#3182f6] text-white px-1.5 py-0.5 rounded hidden\">CURDESC (CPU 지정)</span>\n              </div>\n              <div class=\"p-2 px-3 text-[11px] grid grid-cols-[90px_1fr] gap-1 border-b border-gray-100\">\n                <span class=\"text-gray-500\">다음 지시서</span>\n                <span class=\"font-bold text-[#191f28]\">BD 1 <span class=\"text-[10px] text-gray-400 ml-2\">(다음 작업 카드)</span></span>\n              </div>\n              <div class=\"p-2 px-3 text-[11px] grid grid-cols-[90px_1fr] gap-1 border-b border-gray-100\">\n                <span class=\"text-gray-500\">데이터 블록</span>\n                <span class=\"font-bold text-[#191f28]\">첫 번째 물리 블록 <span class=\"text-gray-400 ml-1\">(4KB)</span></span>\n              </div>\n              <!-- Progress Bar Container -->\n              <div class=\"h-1.5 w-full bg-gray-100 relative overflow-hidden\">\n                <div id=\"bd-0-progress\" class=\"absolute left-0 top-0 h-full bg-[#3182f6] w-0\"></div>\n              </div>\n              <div class=\"p-2 px-3 text-[11px] bg-gray-50 flex gap-2 items-center\">\n                <span class=\"text-gray-500\">상태</span><span id=\"bd-0-status\" class=\"italic text-gray-500\">Waiting</span>\n              </div>\n            </div>\n\n            <!-- Arrow -->\n            <div class=\"w-px h-6 bg-gray-300 border-l-2 border-dashed border-gray-300 absolute left-8 top-[125px] z-0\"></div>\n\n            <!-- BD 1 -->\n            <div id=\"bd-1\" class=\"bd-card bg-white shadow-sm rounded-lg overflow-hidden\">\n              <div class=\"bg-gray-100 text-gray-700 text-xs font-bold px-3 py-2 border-b border-gray-200\">\n                BD 1 (@0x1040)\n              </div>\n              <div class=\"p-2 px-3 text-[11px] grid grid-cols-[90px_1fr] gap-1 border-b border-gray-100\">\n                <span class=\"text-gray-500\">다음 지시서</span>\n                <span class=\"font-bold text-[#191f28]\">Tail marker</span>\n              </div>\n              <div class=\"p-2 px-3 text-[11px] grid grid-cols-[90px_1fr] gap-1 border-b border-gray-100\">\n                <span class=\"text-gray-500\">데이터 블록</span>\n                <span class=\"font-bold text-[#191f28]\">두 번째 물리 블록 <span class=\"text-gray-400 ml-1\">(2KB, 마지막)</span></span>\n              </div>\n              <!-- Progress Bar Container -->\n              <div class=\"h-1.5 w-full bg-gray-100 relative overflow-hidden\">\n                <div id=\"bd-1-progress\" class=\"absolute left-0 top-0 h-full bg-[#3182f6] w-0\"></div>\n              </div>\n              <div class=\"p-2 px-3 text-[11px] bg-gray-50 flex gap-2 items-center\">\n                <span class=\"text-gray-500\">상태</span><span id=\"bd-1-status\" class=\"italic text-gray-500\">Waiting</span>\n              </div>\n            </div>\n\n            <!-- Arrow -->\n            <div class=\"w-px h-6 bg-gray-300 border-l-2 border-dashed border-gray-300 absolute left-8 top-[250px] z-0\"></div>\n\n             <!-- BD 2 (Tail) -->\n             <div id=\"bd-2\" class=\"bd-card bg-white border-dashed shadow-sm rounded-lg overflow-hidden opacity-60\">\n              <div class=\"bg-gray-50 text-gray-500 text-xs font-bold px-3 py-2 border-b border-gray-200 flex justify-between items-center\">\n                <span>BD 2 (@0x1080)</span>\n                <span id=\"bd-2-tag\" class=\"text-[9px] bg-red-100 text-red-600 border border-red-200 px-1.5 py-0.5 rounded hidden font-bold\">TAILDESC (CPU 지정)</span>\n              </div>\n              <div class=\"p-3 text-center text-[10px] text-gray-500 font-bold leading-tight\">\n                NXTDESC == TAILDESC 매칭 시,<br>\n                모든 처리를 중단하고 CPU에게 Interrupt 발생.\n              </div>\n            </div>\n          </div>\n        </div>\n\n        <!-- RIGHT: Actual Physical Memory Data -->\n        <div class=\"flex-1 bg-white border border-[#e5e8eb] p-6 rounded-xl relative shadow-inner\">\n           <h4 class=\"text-xs font-bold text-gray-500 mb-6 tracking-wide text-center\">Physical Memory (Scattered Data)</h4>\n           \n           <div class=\"space-y-4\">\n             <!-- Data Chunk 1 -->\n             <div id=\"data-chunk-0\" class=\"data-chunk bg-gray-50 p-4 rounded-lg relative overflow-hidden\">\n               <div class=\"flex justify-between items-center mb-2 relative z-10\">\n                 <span class=\"text-[11px] text-purple-600 font-bold bg-purple-100 px-2 py-0.5 rounded\">물리 블록 A</span>\n                 <span class=\"text-[10px] font-bold text-gray-500\">4KB Block</span>\n               </div>\n               <!-- Progress Bar -->\n               <div class=\"h-2 w-full bg-gray-200 rounded-full overflow-hidden relative z-10\">\n                 <div id=\"data-prog-0\" class=\"h-full bg-purple-500 w-0\"></div>\n               </div>\n               <i data-lucide=\"file-image\" class=\"absolute -right-2 -bottom-2 w-16 h-16 text-purple-100 z-0\"></i>\n             </div>\n             \n             <!-- Irrelevant Memory Gap -->\n             <div class=\"text-center py-2\">\n               <i data-lucide=\"more-vertical\" class=\"w-4 h-4 text-gray-300 mx-auto\"></i>\n               <span class=\"text-[9px] text-gray-400\">다른 프로그램이 사용 중인 메모리 영역</span>\n               <i data-lucide=\"more-vertical\" class=\"w-4 h-4 text-gray-300 mx-auto\"></i>\n             </div>\n\n             <!-- Data Chunk 2 -->\n             <div id=\"data-chunk-1\" class=\"data-chunk bg-gray-50 p-4 rounded-lg relative overflow-hidden\">\n               <div class=\"flex justify-between items-center mb-2 relative z-10\">\n                 <span class=\"text-[11px] text-pink-600 font-bold bg-pink-100 px-2 py-0.5 rounded\">물리 블록 B</span>\n                 <span class=\"text-[10px] font-bold text-gray-500\">2KB Block (EOF)</span>\n               </div>\n               <!-- Progress Bar -->\n               <div class=\"h-2 w-full bg-gray-200 rounded-full overflow-hidden relative z-10\">\n                 <div id=\"data-prog-1\" class=\"h-full bg-pink-500 w-0\"></div>\n               </div>\n               <i data-lucide=\"file-image\" class=\"absolute -right-2 -bottom-2 w-16 h-16 text-pink-100 z-0\"></i>\n             </div>\n           </div>\n        </div>\n      </div>\n    </div>"}, "csr": {"id": "csr", "html": "<div class=\"space-y-4 border-b border-gray-200 pb-6\">\n        <span class=\"text-[#3182f6] font-bold text-sm tracking-wide\">Chapter 5. Memory Mapped I/O</span>\n        <h2 class=\"text-3xl font-extrabold text-[#191f28]\">Interactive CSR Memory Map</h2>\n        <p class=\"text-[#4e5968] text-lg\">CPU-DMA 간의 비동기 제어 권한 이양을 위한 Memory-Mapped Register 구조와 Bit-Field 정의를 심층 조명합니다.</p>\n      </div>\n\n      <div class=\"bg-white rounded-2xl border border-gray-200 shadow-sm p-8\">\n        <h3 class=\"text-lg font-bold text-[#191f28] mb-4 border-l-4 border-[#3182f6] pl-3\">5.1 레지스터 요약</h3>\n        <div class=\"overflow-x-auto\">\n          <table class=\"data-table\">\n            <thead>\n              <tr>\n                <th>이름</th>\n                <th>Offset</th>\n                <th>Access</th>\n                <th>의미</th>\n              </tr>\n            </thead>\n            <tbody>\n              <tr>\n                <td class=\"font-bold\">Control</td>\n                <td>제어 영역</td>\n                <td>RW</td>\n                <td>DMA enable, interrupt enable, interrupt pending 상태 제어</td>\n              </tr>\n              <tr>\n                <td class=\"font-bold\">Transfer Info</td>\n                <td>전송 정보 영역</td>\n                <td>RW/RO mix</td>\n                <td>GO 시작 비트, BUSY/DONE 상태, CHUNK 크기, 총 BYTES 길이</td>\n              </tr>\n              <tr>\n                <td class=\"font-bold\">Source</td>\n                <td>읽기 주소 영역</td>\n                <td>RW</td>\n                <td>읽기 시작 주소</td>\n              </tr>\n              <tr>\n                <td class=\"font-bold\">Destination</td>\n                <td>쓰기 주소 영역</td>\n                <td>RW</td>\n                <td>쓰기 시작 주소</td>\n              </tr>\n            </tbody>\n          </table>\n        </div>\n\n        <div class=\"grid lg:grid-cols-2 gap-8 mt-10\">\n          <div>\n            <h3 class=\"text-lg font-bold text-[#191f28] mb-4 border-l-4 border-[#3182f6] pl-3\">5.2 Control Register</h3>\n            <p class=\"text-sm text-gray-600 mb-4\">CONTROL 레지스터는 하드웨어 코어의 Global 활성화 및 Interrupt 정책을 관장하며, Pending Interrupt의 명시적 초기화(W1C) 기능을 담당합니다.</p>\n            <div class=\"flex border-2 border-gray-300 rounded-lg overflow-hidden h-16 mb-4 text-center text-[11px] font-bold\">\n              <div class=\"flex-1 bg-blue-50 flex flex-col justify-center border-r border-gray-300 bit-group\" onmouseover=\"showDesc('control-desc', 'Enable (EN): 하드웨어 엔진의 최상위 구동 스위치입니다. Disabled 상태 시 Read/Write 파이프라인이 전면 동결됩니다.')\">\n                <span class=\"text-gray-500 font-normal\">31</span>\n                <span class=\"text-blue-700\">EN</span>\n              </div>\n              <div class=\"flex-1 bg-gray-100 flex flex-col justify-center border-r border-gray-300 bit-group\" onmouseover=\"showDesc('control-desc', 'Reserved (RSVD): 예약 영역으로, 현재 아키텍처 범위 내에서 사용되지 않습니다.')\">\n                <span class=\"text-gray-400 font-normal\">30 .. 2</span>\n                <span class=\"text-gray-400\">RSVD</span>\n              </div>\n              <div class=\"w-20 bg-orange-50 flex flex-col justify-center border-r border-gray-300 bit-group\" onmouseover=\"showDesc('control-desc', 'Interrupt Pending (IP): 완료 통보가 대기 중(Pending)임을 식별합니다. 소프트웨어 ISR 계층에서 명시적으로 Clear해야 합니다.')\">\n                <span class=\"text-gray-500 font-normal\">1</span>\n                <span class=\"text-orange-600\">IP</span>\n              </div>\n              <div class=\"w-20 bg-green-50 flex flex-col justify-center bit-group\" onmouseover=\"showDesc('control-desc', 'Interrupt Enable (IE): 비동기 트랜잭션 정상 완료 이벤트를 호스트 OS/Processor에 통지할지 허용 여부를 결정합니다.')\">\n                <span class=\"text-gray-500 font-normal\">0</span>\n                <span class=\"text-green-700\">IE</span>\n              </div>\n            </div>\n            <div id=\"control-desc\" class=\"desc-box bg-[#191f28] text-white text-sm p-4 rounded-xl shadow-inner min-h-[72px] flex items-center justify-center font-bold\">\n              비트에 마우스를 올리면 의미가 표시됩니다.\n            </div>\n          </div>\n\n          <div>\n            <h3 class=\"text-lg font-bold text-[#191f28] mb-4 border-l-4 border-red-500 pl-3\">5.3 Transfer Info Register</h3>\n            <p class=\"text-sm text-gray-600 mb-4\">트랜잭션 실행 트리거 및 상태를 요약하는 복합 Register입니다. 펌웨어 로직은 본 영역을 기동 인가용으로 쓰거나 상태 검증용으로 읽습니다.</p>\n            <div class=\"flex border-2 border-gray-300 rounded-lg overflow-hidden h-16 mb-4 text-center text-[11px] font-bold\">\n              <div class=\"w-20 bg-purple-50 flex flex-col justify-center border-r border-gray-300 bit-group\" onmouseover=\"showDesc('num-desc', 'Start (GO): 하드웨어 기동 명령 비트. 트랜잭션이 성공적으로 종결 시 자동 강하(Self-clearing)되도록 설계되었습니다.')\">\n                <span class=\"text-gray-500 font-normal\">31</span>\n                <span class=\"text-purple-700\">GO</span>\n              </div>\n              <div class=\"w-20 bg-yellow-50 flex flex-col justify-center border-r border-gray-300 bit-group\" onmouseover=\"showDesc('num-desc', 'Busy (BUSY): Read Module 또는 Write Module 중 한 개라도 FSM 트랜잭션을 진행하고 있는 점유율을 반영합니다.')\">\n                <span class=\"text-gray-500 font-normal\">30</span>\n                <span class=\"text-yellow-700\">BUSY</span>\n              </div>\n              <div class=\"w-20 bg-green-50 flex flex-col justify-center border-r border-gray-300 bit-group\" onmouseover=\"showDesc('num-desc', 'Done (DONE): Read와 Write 모듈 양단에서 모든 AXI Handshake 종결이 승인되었을 때 Assert됩니다.')\">\n                <span class=\"text-gray-500 font-normal\">29</span>\n                <span class=\"text-green-700\">DONE</span>\n              </div>\n              <div class=\"w-20 bg-gray-100 flex flex-col justify-center border-r border-gray-300 bit-group\" onmouseover=\"showDesc('num-desc', 'Reserved (28:24)')\">\n                <span class=\"text-gray-400 font-normal\">28 .. 24</span>\n                <span class=\"text-gray-400\">RSVD</span>\n              </div>\n              <div class=\"w-24 bg-blue-50 flex flex-col justify-center border-r border-gray-300 bit-group\" onmouseover=\"showDesc('num-desc', 'CHUNK Parameter (23:16): 물리 버스트의 단편화 크기 할당 파라미터. Data Width 배수로 정합되어야 하며, 0 인가 시 최소 단위(Base Beat)를 의미합니다.')\">\n                <span class=\"text-gray-500 font-normal\">23 .. 16</span>\n                <span class=\"text-blue-700\">CHUNK</span>\n              </div>\n              <div class=\"flex-1 bg-orange-50 flex flex-col justify-center bit-group\" onmouseover=\"showDesc('num-desc', 'Transfer Payload Length (15:0): 누적 요구 바이트 길이. 16비트로 매핑되어 최대 2^16-1의 범위가 한 번의 MMIO 트랜잭션에서 대응됩니다.')\">\n                <span class=\"text-gray-500 font-normal\">15 .. 0</span>\n                <span class=\"text-orange-600\">BYTES</span>\n              </div>\n            </div>\n            <div id=\"num-desc\" class=\"desc-box bg-[#191f28] text-white text-sm p-4 rounded-xl shadow-inner min-h-[72px] flex items-center justify-center font-bold\">\n              비트에 마우스를 올리면 의미가 표시됩니다.\n            </div>\n          </div>\n        </div>\n\n        <div class=\"mt-10 grid lg:grid-cols-[1.1fr_0.9fr] gap-8\">\n          <div>\n            <h3 class=\"text-lg font-bold text-[#191f28] mb-4 border-l-4 border-green-500 pl-3\">5.4 SOURCE/DEST Address Register</h3>\n            <p class=\"text-sm text-gray-600 mb-4\">단순한 메모리 포인터 구조를 지니나, 하이엔드 트랜잭션에서는 이 주소의 하위 비트 Alignment 특성이 실질 성능 편향을 유도합니다.</p>\n            <div class=\"overflow-x-auto\">\n              <table class=\"data-table\">\n                <thead>\n                  <tr>\n                    <th>레지스터</th>\n                    <th>주소</th>\n                    <th>설명</th>\n                  </tr>\n                </thead>\n                <tbody>\n                  <tr>\n                    <td class=\"font-bold\">Source</td>\n                    <td>읽기 주소 영역</td>\n                    <td>Read Engine의 시작 주소 기준이 됩니다.</td>\n                  </tr>\n                  <tr>\n                    <td class=\"font-bold\">Destination</td>\n                    <td>쓰기 주소 영역</td>\n                    <td>Write Engine의 시작 주소 기준이 됩니다.</td>\n                  </tr>\n                </tbody>\n              </table>\n            </div>\n          </div>\n\n          <div class=\"bg-[#f9fafb] rounded-2xl border border-gray-200 p-6\">\n            <h3 class=\"text-lg font-bold text-[#191f28] mb-4\">5.5 MMIO 시퀀스 체인 권장안</h3>\n            <div class=\"space-y-3\">\n              <div class=\"bg-white border border-gray-200 rounded-xl p-4\">\n                <p class=\"text-[12px] font-bold text-[#191f28]\">A. Initialization Phase</p>\n                <p class=\"text-[12px] text-[#4e5968] mt-1\">CONTROL CSR을 선행 조작하여 DMA 구동 허가 상태와 비동기 Interrupt 활성 범위를 확립합니다.</p>\n              </div>\n              <div class=\"bg-white border border-gray-200 rounded-xl p-4\">\n                <p class=\"text-[12px] font-bold text-[#191f28]\">B. Address Mapping Phase</p>\n                <p class=\"text-[12px] text-[#4e5968] mt-1\">SOURCE 및 DEST 레지스터 쌍을 매핑합니다. 두 영역 간의 Alignment 대칭성이 Bus 효율 최적화를 보장합니다.</p>\n              </div>\n              <div class=\"bg-white border border-gray-200 rounded-xl p-4\">\n                <p class=\"text-[12px] font-bold text-[#191f28]\">C. Execution Trigger Phase</p>\n                <p class=\"text-[12px] text-[#4e5968] mt-1\">NUM 컨트롤 구조체에 누적 Transfer Byte 포맷과 Burst Chunk 배분 지수를 동시 합성하여 GO 명령을 인가합니다.</p>\n              </div>\n              <div class=\"bg-white border border-gray-200 rounded-xl p-4\">\n                <p class=\"text-[12px] font-bold text-[#191f28]\">D. Completion Verification Phase</p>\n                <p class=\"text-[12px] text-[#4e5968] mt-1\">BUSY 플래그 하강 또는 Interrupt Signal 인입을 근거로 파이프라인 무결성을 진단합니다.</p>\n              </div>\n            </div>\n            <p class=\"text-[13px] text-[#4e5968] mt-3 leading-relaxed\">\n              위 모델링은 일반 프로세서 인터페이스 뿐 아니라 BFM 시뮬레이션 환경에서도 동일하게 통용되는 표준적 MMIO 패턴입니다. <strong>소프트웨어 Layer는 제어의 타이밍을 지휘할 뿐, 물리적 전송 상태 전이 및 Alignment 분할은 하드웨어 코어가 자율 통제합니다.</strong>\n            </p>\n            <div class=\"mt-5 bg-white border border-gray-200 rounded-xl p-4\">\n              <p class=\"text-[12px] font-bold text-[#191f28]\">실무 아키텍트 가이드</p>\n              <p class=\"text-[12px] text-[#4e5968] mt-1 leading-relaxed\">\n                가변 CHUNK 길이는 AXI Databus 폭(Width)에 대한 직교배수로 설정함이 원칙입니다. 과도한 CHUNK 스펙의 오버 커밋(Over-commit)은 FIFO Depth Capacity와의 상관관계에 따라 시스템 Bus Deadlock을 초래할 수 있음에 유의하십시오.\n              </p>\n            </div>\n          </div>\n        </div>\n\n      </div>"}, "case": {"id": "case", "html": "<div class=\"space-y-4 border-b border-gray-200 pb-6\">\n        <span class=\"text-[#3182f6] font-bold text-sm tracking-wide\">Chapter 6. Real-world Pipeline</span>\n        <h2 class=\"text-3xl font-extrabold text-[#191f28]\">TEA 암호화 파이프라인 구동 시뮬레이션</h2>\n        <p class=\"text-[#4e5968] text-lg\">SystemVerilog Testbench 환경에서 검증되는 실제 유스케이스로서, 고속 메모리 맵(Memory Map) 평문 데이터가 AXI-Stream 기반의 IP를 통과하며 암호문으로 변환되는 동적 파이프라인을 분석합니다.</p>\n      </div>\n\n      <div class=\"bg-white p-8 rounded-2xl border border-gray-200 shadow-sm\">\n        <h3 class=\"text-xl font-bold text-[#191f28] mb-4\">6.1 테스트벤치가 검증하는 실제 시나리오</h3>\n        <div class=\"grid md:grid-cols-2 gap-6\">\n          <div class=\"space-y-3\">\n            <div class=\"bg-[#f9fafb] border border-gray-200 rounded-xl p-4\">\n              <p class=\"text-[13px] text-[#191f28] font-semibold\">메모리 초기화 (Pattern Injection)</p>\n              <p class=\"text-[13px] text-[#4e5968] mt-1\">Source Address 스페이스에 테스트 벡터(평문 데이터)를 주입하고, Target Destination 스페이스는 Clear하여 검증 무결성을 확보합니다.</p>\n            </div>\n            <div class=\"bg-[#f9fafb] border border-gray-200 rounded-xl p-4\">\n              <p class=\"text-[13px] text-[#191f28] font-semibold\">레지스터 프로그래밍 (MMIO 설정)</p>\n              <p class=\"text-[13px] text-[#4e5968] mt-1\">Bus Functional Model(BFM)을 통해 인터럽트/포인터/트랜잭션 길이 기반의 DMA 레지스터를 Write한 후 GO 플래그를 Assert합니다.</p>\n            </div>\n            <div class=\"bg-[#f9fafb] border border-gray-200 rounded-xl p-4\">\n              <p class=\"text-[13px] text-[#191f28] font-semibold\">결과 검증 (Golden Model 비교)</p>\n              <p class=\"text-[13px] text-[#4e5968] mt-1\">Hardware 트랜잭션 종료 시, Host는 Destination Memory Block을 인출하여 C-Reference 모델과 Byte 단위의 Mismatch를 대조합니다.</p>\n            </div>\n          </div>\n          <div class=\"bg-[#191f28] text-white rounded-2xl p-6\">\n            <h4 class=\"font-bold mb-3\">검증 체크리스트</h4>\n            <ul class=\"space-y-2 text-[13px] text-gray-200\">\n              <li>Disable(EN=0) 상태에서의 자발적 Trigger 무시 기동 확인</li>\n              <li>Source/Destination Boundary Alignment 차이 시 Misaligned Handler 구동 확인</li>\n              <li>최소 단편화(Base Beat) 및 잔여 Payload(Partial Transfer) 정합성 확인</li>\n              <li>TLAST Propagation 시퀀스와 연계된 종단 처리 검증</li>\n              <li>FIFO Capacity 한계(Full/Empty)에 따른 Backpressure 반응성 점검</li>\n            </ul>\n          </div>\n        </div>\n      </div>\n\n      <div class=\"bg-white p-8 rounded-2xl border border-gray-200 shadow-sm\">\n        <div class=\"flex justify-between items-start mb-6\">\n          <p class=\"text-[14px] text-[#4e5968] max-w-2xl leading-relaxed\">\n            순수 Memory-to-Memory 연결망 사이에 AXI-Stream 기반 Custom Accelerator를 삽입한 아키텍처입니다. <strong>TEA(Tiny Encryption Algorithm) Core</strong>는 AXI-Stream Slave 인터페이스로 파이프라인의 입력을 수신하여 64-bit 단위 비대칭 연산을 수행한 뒤, 동기화된 M_AXIS 경로를 통해 Write Engine 측으로 배출합니다.\n          </p>\n          <button onclick=\"runTeaAnimation()\" id=\"btn-tea\" class=\"bg-orange-500 hover:bg-orange-600 text-white px-5 py-2.5 rounded-xl font-bold text-sm flex items-center gap-2 transition-all active:scale-95 shadow-md whitespace-nowrap mt-2\">\n            <i data-lucide=\"lock\" class=\"w-4 h-4\"></i> 암호화 파이프라인 가동\n          </button>\n        </div>\n\n        <!-- TEA Pipeline Animation Canvas -->\n        <div class=\"wide-visual\">\n        <div class=\"wide-visual-canvas bg-[#191f28] p-6 rounded-xl border border-gray-800 flex items-center justify-between relative overflow-hidden h-[240px] shadow-inner\">\n          \n          <!-- Source Memory -->\n          <div class=\"w-24 h-24 bg-gray-800 border border-gray-600 rounded flex flex-col items-center justify-center text-white z-10 shadow-lg\">\n            <i data-lucide=\"file-text\" class=\"w-6 h-6 text-gray-400 mb-1\"></i>\n            <span class=\"text-[10px] font-bold\">Plaintext<br>Memory</span>\n          </div>\n\n          <!-- MM2S Stream -->\n          <div class=\"flex-1 h-12 relative flex items-center justify-center mx-2 z-0\">\n             <div class=\"absolute inset-x-0 top-1/2 -translate-y-1/2 h-1 bg-gray-700\"></div>\n             <span class=\"absolute top-0 text-[9px] text-[#3182f6] font-bold\">Stream In</span>\n             <div id=\"tea-tx-channel\" class=\"absolute inset-0 overflow-hidden\"></div>\n          </div>\n\n          <!-- TEA Core -->\n          <div id=\"tea-core\" class=\"w-32 h-32 bg-orange-400 border-2 border-orange-500 rounded-xl flex flex-col items-center justify-center text-white z-10 shadow-[0_0_15px_rgba(249,115,22,0.4)] transition-all duration-300\">\n             <i data-lucide=\"lock\" class=\"w-8 h-8 mb-1\" id=\"tea-lock-icon\"></i>\n             <span class=\"text-sm font-extrabold\">TEA Core</span>\n             <span class=\"text-[9px] bg-orange-500 px-1 rounded mt-1\">Encrypting</span>\n          </div>\n\n          <!-- S2MM Stream -->\n          <div class=\"flex-1 h-12 relative flex items-center justify-center mx-2 z-0\">\n             <div class=\"absolute inset-x-0 top-1/2 -translate-y-1/2 h-1 bg-gray-700\"></div>\n             <span class=\"absolute top-0 text-[9px] text-[#22c55e] font-bold\">Stream Out</span>\n             <div id=\"tea-rx-channel\" class=\"absolute inset-0 overflow-hidden\"></div>\n          </div>\n\n          <!-- Dest Memory -->\n          <div class=\"w-24 h-24 bg-gray-800 border border-gray-600 rounded flex flex-col items-center justify-center text-white z-10 shadow-lg\">\n            <i data-lucide=\"file-key-2\" class=\"w-6 h-6 text-red-400 mb-1\"></i>\n            <span class=\"text-[10px] font-bold\">Ciphertext<br>Memory</span>\n          </div>\n        </div>\n        </div>\n\n        <div class=\"mt-6 bg-[#f9fafb] border border-gray-200 rounded-2xl p-6\">\n          <h4 class=\"font-bold text-[#191f28] mb-3\">TLAST Latency Alignment: 입력 종단 신호를 출력 데이터에 다시 맞추기</h4>\n          <p class=\"text-[13px] text-[#4e5968] mb-4 leading-relaxed\">\n            암호화 코어가 내부에서 여러 cycle을 소비하면, 데이터만 지연되는 것이 아니라 TLAST도 같은 깊이만큼 지연되어야 합니다.\n            아래 그림처럼 입력 D3에 붙어 있던 TLAST는 출력 C3이 나가는 순간에 맞춰 다시 발생해야 S2MM이 패킷 완료를 인식합니다.\n          </p>\n          <div class=\"wide-visual\">\n            <svg class=\"wide-visual-canvas\" viewBox=\"0 0 960 330\" role=\"img\" aria-label=\"TEA TLAST latency alignment diagram\" style=\"display:block;margin:0 auto;\">\n              <rect x=\"18\" y=\"18\" width=\"924\" height=\"294\" rx=\"18\" fill=\"#ffffff\" stroke=\"#e5e8eb\"></rect>\n              <text x=\"480\" y=\"52\" text-anchor=\"middle\" fill=\"#191f28\" font-size=\"22\" font-weight=\"900\">Pipeline Delay Matching</text>\n              <text x=\"480\" y=\"76\" text-anchor=\"middle\" fill=\"#4e5968\" font-size=\"13\" font-weight=\"700\">Payload와 sideband(TLAST)는 같은 latency path를 지나야 합니다.</text>\n\n              <g font-size=\"13\" font-weight=\"800\" text-anchor=\"middle\">\n                <rect x=\"74\" y=\"112\" width=\"84\" height=\"44\" rx=\"10\" fill=\"#eff7ff\" stroke=\"#bfdbfe\"></rect>\n                <text x=\"116\" y=\"140\" fill=\"#1d4ed8\">D0</text>\n                <rect x=\"174\" y=\"112\" width=\"84\" height=\"44\" rx=\"10\" fill=\"#eff7ff\" stroke=\"#bfdbfe\"></rect>\n                <text x=\"216\" y=\"140\" fill=\"#1d4ed8\">D1</text>\n                <rect x=\"274\" y=\"112\" width=\"84\" height=\"44\" rx=\"10\" fill=\"#eff7ff\" stroke=\"#bfdbfe\"></rect>\n                <text x=\"316\" y=\"140\" fill=\"#1d4ed8\">D2</text>\n                <rect x=\"374\" y=\"112\" width=\"84\" height=\"44\" rx=\"10\" fill=\"#fff1f2\" stroke=\"#fecaca\"></rect>\n                <text x=\"416\" y=\"132\" fill=\"#dc2626\">D3</text>\n                <text x=\"416\" y=\"150\" fill=\"#dc2626\" font-size=\"11\">TLAST</text>\n\n                <rect x=\"512\" y=\"102\" width=\"114\" height=\"64\" rx=\"14\" fill=\"#fff7ed\" stroke=\"#fed7aa\"></rect>\n                <text x=\"569\" y=\"127\" fill=\"#c2410c\">TEA Core</text>\n                <text x=\"569\" y=\"147\" fill=\"#4e5968\" font-size=\"11\">N-cycle latency</text>\n\n                <rect x=\"682\" y=\"112\" width=\"84\" height=\"44\" rx=\"10\" fill=\"#ecfdf5\" stroke=\"#bbf7d0\"></rect>\n                <text x=\"724\" y=\"140\" fill=\"#15803d\">C0</text>\n                <rect x=\"782\" y=\"112\" width=\"84\" height=\"44\" rx=\"10\" fill=\"#ecfdf5\" stroke=\"#bbf7d0\"></rect>\n                <text x=\"824\" y=\"140\" fill=\"#15803d\">C1...</text>\n              </g>\n\n              <g stroke=\"#4e5968\" stroke-width=\"2.5\" fill=\"none\" stroke-linecap=\"round\">\n                <path d=\"M458 134 H502\"></path>\n                <path d=\"M626 134 H672\"></path>\n              </g>\n\n              <g font-size=\"12\" font-weight=\"800\" text-anchor=\"middle\">\n                <rect x=\"180\" y=\"208\" width=\"184\" height=\"46\" rx=\"12\" fill=\"#f3e8ff\" stroke=\"#d8b4fe\"></rect>\n                <text x=\"272\" y=\"228\" fill=\"#7c3aed\">TLAST shift register</text>\n                <text x=\"272\" y=\"246\" fill=\"#4e5968\" font-size=\"11\">same depth as data pipe</text>\n                <rect x=\"596\" y=\"208\" width=\"184\" height=\"46\" rx=\"12\" fill=\"#fff1f2\" stroke=\"#fecaca\"></rect>\n                <text x=\"688\" y=\"228\" fill=\"#dc2626\">Output TLAST</text>\n                <text x=\"688\" y=\"246\" fill=\"#4e5968\" font-size=\"11\">assert with final C beat</text>\n              </g>\n              <path d=\"M416 158 C416 196 280 190 272 208\" stroke=\"#8b5cf6\" stroke-width=\"2.4\" fill=\"none\"></path>\n              <path d=\"M364 231 H586\" stroke=\"#8b5cf6\" stroke-width=\"2.4\" fill=\"none\"></path>\n              <path d=\"M688 208 C690 188 724 178 824 158\" stroke=\"#dc2626\" stroke-width=\"2.4\" fill=\"none\"></path>\n            </svg>\n          </div>\n        </div>\n\n        <div class=\"mt-6 bg-[#fff7ed] p-5 rounded-xl border border-orange-200\">\n          <h4 class=\"font-bold text-orange-600 text-sm mb-2 flex items-center gap-1\"><i data-lucide=\"alert-triangle\" class=\"w-4 h-4\"></i> 설계 시 핵심 포인트 (TLAST 동기화)</h4>\n          <p class=\"text-[13px] text-gray-700\">\n            스트림 가속기(Hardware IP) 통합 설계 시의 결정적 이슈는 <strong>입력 Packet의 종단 마커(TLAST)가 파이프라인의 연산 Latency만큼 Delay Line을 거쳐 출력 패킷의 정위치에 복원</strong>되어야 한다는 점입니다. TLAST의 Propagation 지연이 어긋날 경우 수신단(Write Engine)의 상태 전이 조건이 누락되어 Deadlock을 초래합니다.\n          </p>\n        </div>\n\n        <div class=\"mt-6 grid md:grid-cols-3 gap-4\">\n          <div class=\"bg-[#eff7ff] border border-blue-200 rounded-xl p-5\">\n            <h4 class=\"font-bold text-blue-900 text-sm mb-2\">Stream 입력 수락</h4>\n            <p class=\"text-[12px] text-blue-800 leading-relaxed\">\n              `S_TVALID && S_TREADY` 조건이 High인 Cycle에서만 유효 페이로드로 래치합니다. 이 때 TLAST 메타데이터도 페이로드와 함께 파이프라인에 캡처해야 합니다.\n            </p>\n          </div>\n          <div class=\"bg-[#fff7ed] border border-orange-200 rounded-xl p-5\">\n            <h4 class=\"font-bold text-orange-900 text-sm mb-2\">Internal 연산 지연</h4>\n            <p class=\"text-[12px] text-orange-800 leading-relaxed\">\n              TEA의 Fiestel 결합 특성 상 다단 라운드 버퍼링이 발생합니다. TLAST 역시 동일한 Shift Register 깊이(Depth)만큼 일치된 지연(Latency) 보상을 수반해야 합니다.\n            </p>\n          </div>\n          <div class=\"bg-[#ecfdf5] border border-green-200 rounded-xl p-5\">\n            <h4 class=\"font-bold text-green-900 text-sm mb-2\">Stream 출력 배출</h4>\n            <p class=\"text-[12px] text-green-800 leading-relaxed\">\n              `M_TVALID && M_TREADY` Handshake 조건에 대응하여 암호문을 방출합니다. 블록의 종단 사이클에 지연된 보상 TLAST 펄스를 일치시켜 Master 버스에 회귀합니다.\n            </p>\n          </div>\n        </div>\n      </div>\n\n      <div class=\"bg-white p-8 rounded-2xl border border-gray-200 shadow-sm\">\n        <div class=\"mb-6\">\n          <span class=\"text-[#3182f6] font-bold text-sm tracking-wide\">6.3 Self-Contained Summary</span>\n          <h3 class=\"text-2xl font-extrabold text-[#191f28] mt-1\">AXI DMA Summary Map</h3>\n          <p class=\"text-[14px] text-[#4e5968] mt-2 leading-relaxed\">\n            아래 요약은 AXI DMA의 핵심 구성 요소를 다시 정리한 최종 맵입니다.\n            각 항목은 앞 장의 개념, 인터페이스, 상태, 검증 포인트를 한 번에 연결합니다.\n          </p>\n        </div>\n\n        <div class=\"grid md:grid-cols-2 gap-5\">\n          <div class=\"bg-[#eff7ff] border border-blue-200 rounded-2xl p-5\">\n            <h4 class=\"font-bold text-blue-900 mb-2\">Protocol Architecture</h4>\n            <p class=\"text-[13px] text-blue-800 leading-relaxed\">\n              AXI4는 어드레스 페이즈와 데이터 페이즈를 Decoupling하여 파이프라인 버스트를 지원합니다. AR/R 채널과 AW/W/B 채널 간의 비동기적 독립
